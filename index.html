h+='<div class="cd '+(cur?"cd-g":clr?"cd-b":"")+'" style="opacity:'+(lck?.45:1)+'"><div style="display:flex;justify-content:space-between;align-items:center"><div><span class="bdg '+(clr?"bdg-g":cur?"bdg-a":"bdg-b")+'">'+(clr?"&#10003; CLEARED":cur?"&#9679; ACTIVE":"&#128274; LOCKED")+'</span><div class="h3" style="margin-top:6px">P'+p.id+' &mdash; '+esc(p.a)+'</div></div><span class="dim" style="font-family:var(--fm)">Wk '+p.w+'</span></div><div class="ac-h" onclick="tAcc(\'ph'+p.id+'\')"><span></span><span class="ac-i'+(cur?" open":"")+'" id="ai-ph'+p.id+'">&#9660;</span></div><div class="ac-b'+(cur?" open":"")+'" id="ab-ph'+p.id+'">'+body+'</div></div>'});return h}
function doAdv(pid){var ok=document.getElementById("adv-ok");if(!ok||!ok.checked){fl("Confirm improvement","warn");return}var c=document.getElementById("adv-c");c=c?c.value:"";D.phaseHistory=(D.phaseHistory||[]);D.phaseHistory.push({phase:pid,clearedAt:new Date().toISOString(),movements:c});D.currentPhase=pid+1;D.version=(parseFloat(D.version)+.1).toFixed(1);D.clearedMovements=(D.clearedMovements||[]).concat([c]);sv();cfm=null;done={ex:[],dv:[],date:td()};svDone();fl("Phase "+(pid+1)+" active");render()}
/* Train */
function rTrain(ph,pi){var h=L("PHASE "+ph)+'<div class="h2">'+esc(pi.a)+'</div><div class="sub" style="margin-bottom:16px">'+esc(pi.g)+'</div>';
if(ph<=2){h+=A("str","Stretches",(EX[ph].s||[]).map(function(s){return ExCard(s[0],s[1],s[2])}).join(""),"lg",true)+A("exr","Exercises",(EX[ph].e||[]).map(function(e){return ExCard(e[0],e[1],e[2])}).join(""),"lb",true)}
if(ph===3){h+='<div class="wrn" style="margin-bottom:12px">Brace during ALL upper body.</div>'+A("wr","Left Wrist",EX[3].wrist.map(function(s){return ExCard(s[0],s[1],s[2])}).join(""),"lb",true)+A("elb","Right Elbow",EX[3].elbow.map(function(e){return ExCard(e[0],e[1],e[2])}).join(""),"la",true)+A("mod","Upper Body Mods",EX[3].mods.map(function(m){return C('<div style="font-size:12px;color:var(--amb);font-weight:600">REPLACE: '+esc(m[0])+'</div><div class="sub" style="margin-top:4px">&#8594; '+esc(m[1])+'</div>')}).join(""),"la",false)}
if(ph===4)h+=A("re","Reintegration",EX[4].steps.map(function(s){return C('<div class="sub">'+esc(s)+'</div>')}).join(""),"lg",true);return h}
/* Injuries */
function rInj(){var h=L("INJURIES")+'<div class="sub" style="margin-bottom:14px">Left-side = downstream from right foot.</div>';
INJ.forEach(function(inj,i){h+=A("inj"+i,inj.a+" &mdash; "+inj.t,inj.d.map(function(d){return'<div class="sub">&#8226; '+esc(d)+'</div>'}).join("")+'<div class="wrn" style="margin-top:8px">'+inj.w.map(function(w){return'<div>'+esc(w)+'</div>'}).join("")+'</div>',"la",false)});return h}
/* Device */
function rDev(ph){var h=L("EM THERAPY")+'<div class="dim" style="margin-bottom:14px">Min 4hr between. Never stack. Log everything.</div>';
DV.forEach(function(d,i){var act=d.ph===0||d.ph<=ph;
var body='<div class="g2" style="font-size:13px;margin-top:6px"><div>Mode: '+esc(d.md)+'</div><div>Int: '+esc(d.it)+'</div><div>Dur: '+esc(d.du)+'</div></div>'+(act?'<div style="margin-top:8px;padding:10px 14px;background:var(--s1);border-radius:10px">'+d.fb.map(function(f){return'<div style="font-size:12px;color:'+(f.indexOf("STOP")>=0?"var(--rdb)":"var(--t2)")+';padding:2px 0">'+(f.indexOf("STOP")>=0?"&#9888; ":"&#8594; ")+esc(f)+'</div>'}).join("")+'</div>':"");
h+='<div class="cd '+(act?"cd-g":"")+'" style="opacity:'+(act?1:.35)+'"><div style="display:flex;justify-content:space-between"><div class="h3">'+esc(d.a)+'</div><span class="bdg bdg-g">'+esc(d.fr)+'</span></div><div class="ac-h" onclick="tAcc(\'dv'+i+'\')"><span></span><span class="ac-i" id="ai-dv'+i+'">&#9660;</span></div><div class="ac-b" id="ab-dv'+i+'">'+body+'</div></div>'});return h}
/* Log */
function rLog(ph){var h='<div class="fb" style="margin-bottom:14px"><button class="tg'+(logT==="device"?" on":"")+'" style="flex:1;text-align:center" onclick="logT=\'device\';render()">&#9889; Device</button><button class="tg'+(logT==="exercise"?" on":"")+'" style="flex:1;text-align:center" onclick="logT=\'exercise\';render()">&#9650; Exercise</button></div>';
if(logT==="device"){var chk=canLog();if(chk.warn)h+=Al("info",chk.warn);if(!chk.ok)h+=Al("warn",chk.msg);
h+=C(L("LOG DEVICE")+'<div class="g2" style="margin-top:10px"><div><label class="il">Date</label><input class="inp" type="date" id="ld" value="'+td()+'"></div><div><label class="il">Area</label><select class="sel" id="la">'+["Right Foot","Lumbar/Pelvis","Left Wrist","Right Elbow"].map(function(a){return"<option>"+a+"</option>"}).join("")+'</select></div><div><label class="il">Mode</label><input class="inp" id="lm" placeholder="Mode 4 Cupping"></div><div><label class="il">Intensity</label><input class="inp" id="li" placeholder="12/20"></div></div><div style="margin-top:10px"><label class="il">Duration</label><input class="inp" id="ldu" placeholder="15 min"></div><div style="margin-top:10px"><label class="il">Feedback</label><textarea class="ta" id="lf" placeholder="What did you feel?"></textarea></div><div style="margin-top:10px"><label class="il">Next Day</label><textarea class="ta" id="ln" rows="2" placeholder="Next day follow-up"></textarea></div><button class="btn bg bf" style="margin-top:14px" onclick="subD()">Save Session</button>')}
else{var names=gEN(ph);h+=C(L("LOG EXERCISE &mdash; P"+ph)+'<div style="margin-top:10px"><label class="il">Date</label><input class="inp" type="date" id="exd" value="'+td()+'" style="max-width:200px"></div><div style="margin-top:12px"><label class="il">Tap completed</label><div class="fb" style="margin-top:6px">'+names.map(function(n){return'<button class="chip'+(exC.indexOf(n)>=0?" on":"")+'" onclick="tEx(\''+esc(n)+'\')">'+(exC.indexOf(n)>=0?"&#10003; ":"")+esc(n)+'</button>'}).join("")+'</div></div><div style="margin-top:12px"><label class="il">Notes</label><textarea class="ta" id="exn" placeholder="How did it feel?"></textarea></div><button class="btn bb bf" style="margin-top:14px" onclick="subE('+ph+')">Save Log</button>')}
h+='<div style="margin-top:16px">'+L("HISTORY")+'<div class="fbar"><select onchange="flt.type=this.value;render()"><option value="all"'+(flt.type==="all"?" selected":"")+'>All</option><option value="d"'+(flt.type==="d"?" selected":"")+'>Device</option><option value="e"'+(flt.type==="e"?" selected":"")+'>Exercise</option></select><select onchange="flt.area=this.value;render()"><option value="all"'+(flt.area==="all"?" selected":"")+'>All Areas</option>'+["Right Foot","Lumbar/Pelvis","Left Wrist","Right Elbow"].map(function(a){return'<option'+(flt.area===a?" selected":"")+'>'+a+'</option>'}).join("")+'</select><select onchange="flt.days=+this.value;render()"><option value="7"'+(flt.days===7?" selected":"")+'>7d</option><option value="30"'+(flt.days===30?" selected":"")+'>30d</option><option value="9999"'+(flt.days===9999?" selected":"")+'>All</option></select></div></div>';
var all=[].concat((D.sessions||[]).map(function(s){return Object.assign({},s,{_t:"d"})}),(D.exerciseLogs||[]).map(function(s){return Object.assign({},s,{_t:"e"})})).filter(function(s){if(!dA(s.date,flt.days))return false;if(flt.type!=="all"&&s._t!==flt.type)return false;if(flt.area!=="all"&&s._t==="d"&&s.area!==flt.area)return false;return true}).sort(function(a,b){return(b.date||"").localeCompare(a.date||"")}).slice(0,30);
if(!all.length)h+=C('<div class="dim" style="text-align:center;padding:14px">No sessions match.</div>');
else h+=C(all.map(function(s){return'<div class="ss"><div class="ss-h"><span>'+(s._t==="e"?'<span class="bdg bdg-b" style="margin-right:4px">EX</span>P'+(s.phase||"?")+" &mdash; "+(s.completed||[]).length+" done":'<span class="bdg bdg-g" style="margin-right:4px">DEV</span>'+esc(s.area||"")+" "+esc(s.mode||""))+'</span><span class="dim">'+fD(s.date)+'</span></div>'+(s.feedback?'<div class="dim" style="margin-top:4px">'+esc(s.feedback)+'</div>':"")+(s.notes?'<div class="dim" style="margin-top:4px">'+esc(s.notes)+'</div>':"")+(s.nextDay?'<div style="color:var(--t4);font-size:12px;margin-top:2px">'+esc(s.nextDay)+'</div>':"")+'<div class="fb" style="margin-top:8px"><button class="btn bx" style="padding:6px 14px;font-size:11px" onclick="editId='+s.id+';render()">&#9998; Edit</button><button class="btn bx" style="padding:6px 14px;font-size:11px" onclick="delL(\''+s._t+'\','+s.id+')">Delete</button></div></div>'}).join(""));
return h}
function subD(){var m=document.getElementById("lm");if(!m||!m.value){fl("Mode required","warn");return}var chk=canLog();if(!chk.ok){fl(chk.msg,"warn");return}
D.sessions=(D.sessions||[]);D.sessions.push({date:(document.getElementById("ld")||{}).value||td(),area:(document.getElementById("la")||{}).value||"",mode:m.value,intensity:(document.getElementById("li")||{}).value||"",duration:(document.getElementById("ldu")||{}).value||"",feedback:(document.getElementById("lf")||{}).value||"",nextDay:(document.getElementById("ln")||{}).value||"",id:Date.now()});sv();if(chk.warn)fl("&#10003; Saved. "+chk.warn,"info");else fl("&#10003; Device session saved","ok");render()}
function subE(ph){D.exerciseLogs=(D.exerciseLogs||[]);D.exerciseLogs.push({date:(document.getElementById("exd")||{}).value||td(),completed:exC.slice(),notes:(document.getElementById("exn")||{}).value||"",phase:ph,id:Date.now()});exC=[];sv();fl("&#10003; Exercise log saved","ok");render()}
function tEx(n){var i=exC.indexOf(n);if(i>=0)exC.splice(i,1);else exC.push(n);render()}
function delL(t,id){if(t==="d")D.sessions=(D.sessions||[]).filter(function(s){return s.id!==id});else D.exerciseLogs=(D.exerciseLogs||[]).filter(function(s){return s.id!==id});sv();fl("Deleted");render()}
function rModal(){var item,type="d";item=(D.sessions||[]).filter(function(s){return s.id===editId})[0];if(!item){item=(D.exerciseLogs||[]).filter(function(s){return s.id===editId})[0];type="e"}if(!item){editId=null;return""}
var h='<div class="mbg" onclick="if(event.target===this){editId=null;render()}"><div class="mdl"><div class="h2" style="margin-bottom:16px">Edit Entry</div>';
if(type==="d")h+='<div class="g2"><div><label class="il">Date</label><input class="inp" id="ed-dt" value="'+(item.date||"")+'"></div><div><label class="il">Area</label><input class="inp" id="ed-ar" value="'+esc(item.area||"")+'"></div><div><label class="il">Mode</label><input class="inp" id="ed-md" value="'+esc(item.mode||"")+'"></div><div><label class="il">Intensity</label><input class="inp" id="ed-it" value="'+esc(item.intensity||"")+'"></div></div><div style="margin-top:10px"><label class="il">Feedback</label><textarea class="ta" id="ed-fb">'+esc(item.feedback||"")+'</textarea></div><div style="margin-top:10px"><label class="il">Next Day</label><textarea class="ta" id="ed-nd">'+esc(item.nextDay||"")+'</textarea></div>';
else h+='<div><label class="il">Date</label><input class="inp" id="ed-dt" value="'+(item.date||"")+'"></div><div style="margin-top:10px"><label class="il">Notes</label><textarea class="ta" id="ed-nt">'+esc(item.notes||"")+'</textarea></div>';
h+='<div class="fb" style="margin-top:16px"><button class="btn bg" onclick="svEdit(\''+type+'\','+editId+')">Save</button><button class="btn bx" onclick="editId=null;render()">Cancel</button></div></div></div>';return h}
function svEdit(t,id){if(t==="d"){var i=(D.sessions||[]).filter(function(s){return s.id===id})[0];if(i){i.date=(document.getElementById("ed-dt")||{}).value||i.date;i.area=(document.getElementById("ed-ar")||{}).value||i.area;i.mode=(document.getElementById("ed-md")||{}).value||i.mode;i.intensity=(document.getElementById("ed-it")||{}).value||i.intensity;i.feedback=(document.getElementById("ed-fb")||{}).value||"";i.nextDay=(document.getElementById("ed-nd")||{}).value||""}}
else{var i=(D.exerciseLogs||[]).filter(function(s){return s.id===id})[0];if(i){i.date=(document.getElementById("ed-dt")||{}).value||i.date;i.notes=(document.getElementById("ed-nt")||{}).value||""}}sv();editId=null;fl("Saved");render()}
/* Rules */
function rRules(){var h=L("RULES")+'<div class="sub" style="margin-bottom:14px">From all 3 SOPs.</div>';RL.forEach(function(r,i){h+=A("rl"+i,r[0],'<div class="sub">'+esc(r[1])+'</div>',"",false)});return h}
/* Settings */
function rSet(){var h=L("SETTINGS")+'<div class="sub" style="margin-bottom:14px">Update when anything changes.</div>';
h+=C(L("NUTRITION","lg")+'<div class="g2" style="margin-top:8px"><div><label class="il">Cal</label><input class="inp" value="'+esc(D.calorieTarget||"")+'" onchange="D.calorieTarget=this.value;sv()" placeholder="2400"></div><div><label class="il">Protein</label><input class="inp" value="'+esc(D.proteinTarget||"")+'" onchange="D.proteinTarget=this.value;sv()" placeholder="180g"></div></div>');
h+=C(L("SLEEP","lb")+'<label class="il" style="margin-top:8px">Target</label><input class="inp" value="'+esc(D.sleepTarget||"")+'" onchange="D.sleepTarget=this.value;sv()" placeholder="7-8" style="max-width:140px">');
h+=C(L("BACKUP")+'<div class="fb" style="margin-top:8px"><button class="btn bg" onclick="expD()">&#8595; Export</button><label class="btn bb" style="cursor:pointer">&#8593; Import<input type="file" accept=".json" style="display:none" onchange="impD(this)"></label></div>');
h+=C(L("CONNECTION","lp")+'<div class="dim" style="margin-top:4px">'+(isOnline?"&#9989; Connected to shared database":"&#10060; Offline")+'</div><button class="btn bx" style="margin-top:10px" onclick="localStorage.removeItem(\'jt-fb-cfg\');location.reload()">Reconfigure Database</button>');
h+='<div class="cd cd-r">'+L("DANGER","lr")+(cfm!=="reset"?'<button class="btn br" style="margin-top:8px" onclick="cfm=\'reset\';render()">Reset All</button>':'<div style="margin-top:8px;padding:14px;background:var(--s1);border-radius:10px"><div class="sub" style="color:var(--rdb);margin-bottom:10px">Erase everything?</div><div class="fb"><button class="btn br" onclick="D=mkD();sv();cfm=null;fl(\'Reset\');render()">Yes</button><button class="btn bx" onclick="cfm=null;render()">No</button></div></div>')+'</div>';
return h}
function expD(){var b=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="jarrett_"+td()+".json";a.click()}
function impD(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{D=JSON.parse(e.target.result);sv();fl("Imported");render()}catch(err){fl("Invalid","warn")}};r.readAsText(f)}
/* Init */
var cfg=getConfig();
if(cfg&&!cfg.local)initFirebase(cfg);
else if(cfg&&cfg.local){try{D=JSON.parse(localStorage.getItem("jt-loc"))||mkD()}catch(e){D=mkD()}try{var dd=JSON.parse(localStorage.getItem("jt-done-loc"));if(dd&&dd.date===td())done=dd;else done={ex:[],dv:[],date:td()}}catch(e){done={ex:[],dv:[],date:td()}}}
ldRole();render();
</script>
</body>
