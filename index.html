<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarrett Training System</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--s:#111;--b:#1a1a1a;--b2:#222;--t:#e0e0e0;--t2:#888;--t3:#555;--t4:#444;--g:#4a8a5a;--gd:#3a8a5a;--gb:#0d1a0d;--gB:#1a3a1a;--bl:#5a8aaa;--blb:#0d141a;--blB:#1a2a3a;--am:#aa8844;--rd:#cc8888;--rdb:#1a1010;--rdB:#2a1515;--fm:'SF Mono','Fira Code','Cascadia Code',monospace;--fb:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--t);font-family:var(--fb);min-height:100vh;-webkit-font-smoothing:antialiased}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-50px);padding:10px 24px;background:var(--gb);border:1px solid var(--gB);border-radius:8px;color:var(--g);font-size:13px;font-family:var(--fm);z-index:99;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.mid{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:18px 20px;margin-bottom:14px}
.lbl{font-size:10px;font-family:var(--fm);letter-spacing:2px;color:var(--t3);text-transform:uppercase}
.ilbl{display:block;font-size:11px;color:var(--t3);margin-bottom:5px;font-family:var(--fm);letter-spacing:1px}
.inp,.sel,.ta{width:100%;background:#080808;border:1px solid var(--b2);border-radius:5px;padding:9px 12px;color:#ddd;font-size:13px;font-family:var(--fb);outline:none}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--t3)}
.ta{resize:vertical}
.sel{appearance:none;cursor:pointer}
.btn{background:var(--gb);color:var(--g);border:1px solid var(--gB);padding:9px 20px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--fm);letter-spacing:1px;outline:none;transition:all .15s}
.btn:hover{filter:brightness(1.2)}
.btn-bl{background:var(--blb);color:var(--bl);border-color:var(--blB)}
.btn-rd{background:var(--rdb);color:var(--rd);border-color:var(--rdB)}
.btn-c{background:#181818;color:var(--t2);border-color:#333}
.tgl{background:var(--s);color:var(--t3);border:1px solid var(--b2);padding:10px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--fm);outline:none}
.tgl.on{background:var(--gb);color:var(--g);border-color:var(--gB)}
.warn{padding:8px 12px;background:var(--rdb);border-radius:5px;border:1px solid var(--rdB);color:var(--rd);font-size:12px;line-height:1.5}
.chip{padding:7px 12px;font-size:12px;border-radius:5px;cursor:pointer;border:1px solid var(--b2);background:var(--bg);color:#666;font-family:var(--fb);transition:all .15s}
.chip.on{background:var(--gb);color:var(--g);border-color:var(--gB)}
.hdr{border-bottom:1px solid #151515;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;max-width:920px;margin:0 auto}
.nav{border-bottom:1px solid #151515;max-width:920px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--t4);padding:12px 14px;cursor:pointer;font-size:12px;font-family:var(--fb);white-space:nowrap;outline:none}
.nav button.on{color:var(--t);font-weight:600;border-bottom-color:var(--t)}
.body{max-width:920px;margin:0 auto;padding:24px 20px 80px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
.full{grid-column:1/-1}
.fb{display:flex;gap:8px;flex-wrap:wrap}
.sess{padding:8px 0;border-bottom:1px solid #141414;font-size:12px}
.sess-h{display:flex;justify-content:space-between}
.tag{font-family:var(--fm);font-size:9px;margin-right:5px}
.role-btn{background:var(--s);border:1px solid var(--b2);border-radius:12px;padding:26px 30px;cursor:pointer;text-align:left;color:var(--t);min-width:210px;font-family:var(--fb);outline:none;transition:all .2s}
.role-btn:hover{filter:brightness(1.15)}
.role-btn.ow{border-color:var(--gB);background:var(--gb)}
.role-btn.jr{border-color:var(--blB);background:var(--blb)}
.pbadge{font-size:10px;padding:3px 10px;border-radius:4px;background:var(--gb);border:1px solid var(--gB);color:var(--g);font-family:var(--fm)}
.sw{background:none;border:1px solid var(--b2);color:var(--t3);font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;font-family:var(--fm);outline:none}
@media(max-width:500px){.grid2{grid-template-columns:1fr}.role-btn{min-width:160px;padding:20px 22px}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app"></div>
<script>
// ━━━━ DATA (identical to React version) ━━━━
const PHASES=[{id:1,area:"Right Foot & Gait",goal:"Retrain the nervous system to load the right foot normally. Break the 2-year guarding pattern. Improve ankle mobility and nerve conduction.",focus:"Electromagnetic therapy mapping and nerve pathway stabilization along the right foot",weeks:"1-2",gate:"Jarrett walks flat-footed consistently, no tingling during normal walking",include:"Seated, supine, or lying movements that do not load the right foot. Upper body permitted. Non-weight-bearing core.",warning:"No impact loading. Occasional tingling while walking = nerve sensitized, not resolved."},{id:2,area:"Pelvis, Hip & Lumbar",goal:"Release chronic left hip and glute overload. Stabilize pelvis in neutral. Reduce sciatic nerve compression through muscular release, not aggressive stretching.",focus:"Correcting compensation patterns in left hip and glute from right foot fracture. Sciatic decompression.",weeks:"2-3",gate:"Sciatic symptoms reduced, hip flexor no longer snapping, pelvis stable",include:"Movements that support hip mobility and glute activation without aggravating left hip.",warning:"Sciatica is active. No cross-legged sitting, no deep hip flexor stretches under load."},{id:3,area:"Wrist & Elbow",goal:"Stabilize left wrist in neutral. Improve circulation and reduce scar tissue restriction in right elbow. Modify all upper body training.",focus:"TFCC stabilization, scar tissue remodeling, radial nerve recovery, forearm function restoration",weeks:"3-4",gate:"Wrist stable in neutral without drooping, elbow handles moderate grip load",include:"Left wrist protocol, right elbow protocol, forearm scar work, modified upper body with neutral grips.",warning:"Wear full immobilization brace during any upper body training. Ulnar styloid is actively deteriorating."},{id:4,area:"Full Integration",goal:"Systematically reintroduce full training. Each movement added back individually with Jarrett sign-off.",focus:"Progressive reintroduction, one movement per week max. EM therapy continues as maintenance.",weeks:"4+",gate:"All areas assessed by Jarrett, full training reintroduced progressively",include:"Previously restricted movements, added back ONE at a time with sign-off.",warning:"Monitor for return of nerve symptoms (tingling, numbness, shooting pain). If present, regress immediately."}];
const GLOBAL_R=[{m:"Bench press",r:"Loads unstable left wrist DRUJ, stresses deteriorating ulnar styloid"},{m:"Shoulder press",r:"Same wrist loading issue"},{m:"Loaded wrist extension/rotation",r:"Left wrist TFCC tear, DRUJ instability"},{m:"Heavy grip work without brace",r:"Left wrist structural instability"},{m:"Cross-legged sitting",r:"Compresses sciatic nerve"},{m:"High-impact jumping/running on right foot",r:"Nerve still sensitized"},{m:"Heavy barbell squats",r:"Loads compressed lumbar and unstable pelvis"}];
const PHASE_R={1:[["No lower body loading beyond bodyweight","Seated/supine/lying movements"],["No single-leg work on right side","Bilateral seated"],["No weighted calf raises or toe-off on right","Seated foot drills"],["No running/sprinting","Upper body conditioning"]],2:[["No deep loaded hip flexor work","Gentle kneeling stretch (no load)"],["No lunges under load","BW glute bridges, clamshells"],["No leg press full ROM","Partial if cleared"],["No cross-legged stretches","Supine piriformis"],["No seated forward folds straight legs","Knee-to-chest supine"]],3:[["No pressing movements until wrist assessed","Cable chest press neutral grip"],["No loaded wrist extension/rotation (left)","Neutral grip + wraps"],["No heavy tricep work","Neutral grip cable ext"],["No close-grip pressing","Machine tricep work"],["Elbow flaring/shaking = STOP","Reduce load immediately"],["Wear brace during all upper body training",""]],4:[["One new movement per week MAX",""],["Each needs Jarrett direct sign-off",""],["Monitor for return of nerve symptoms","If present, regress immediately"]]};
const EX={1:{s:[["Wall Ankle Mobility","Stand 2-3in from wall, drive knee toward wall keeping heel flat. 30s hold, 3 sets each side.","3x30s"],["Calf Stretch","Split stance, back heel flat. 30s hold, 3 sets right emphasis.","3x30s"],["Towel Toe Curl","Sit barefoot, scrunch towel with toes. Right foot.","3x10"],["Barefoot Standing","Different surfaces, 5 min daily, flat-footed weight on right.","1x5min"]],e:[["Single Leg Balance (Right)","Stand right foot only 30s. Progress to eyes closed.","3x30s"],["Heel-to-Toe Walking","Slow deliberate, 2 room lengths, 2x daily.","2x2len"],["Seated Foot Circles","Full circles, 10 each direction.","2x10ea"],["Short Foot Exercise","Ball toward heel without curling toes. 5s holds.","1x10"]]},2:{s:[["Supine Piriformis Stretch","Cross left ankle over right knee, pull toward chest. Do NOT force, nerve sensitized.","3x30-45s"],["Hip Flexor Kneeling Stretch","Kneeling lunge, left knee back. No aggressive forcing.","3x30s"],["Knee-to-Chest","Both knees to chest, 30s. 2x daily AM and PM.","2x30s"],["Cat-Cow","Alternate arching and rounding spine. Slow.","1x10"]],e:[["Glute Bridges","Drive hips up squeezing both glutes. Equal activation both sides.","3x15"],["Clamshells","Side lying, rotate top knee up. Each side.","3x15ea"],["Dead Bug","Opposite arm/leg lower without arching back. Each side.","3x8ea"],["Standing Hip Abduction","Hold wall, lift left leg to side slowly.","3x12"]]},3:{wrist:[["Wrist Neutral Holds","Hold neutral without brace, increasing duration. Start 30s, progress to 2min.","3x30s-2m"],["Forearm Pronation/Supination","Elbow 90deg, palm up to palm down, NO load. Stop if sharp pain.","3x10"],["Grip Strengthening (Neutral)","Stress ball, wrist neutral supported position only.","3x10"],["Wrist Stabilizer Activation","1-2lb, hold neutral against gravity 30s.","3x30s"]],elbow:[["Forearm Scar Massage","Thumb pressure along scar line with muscle fibers. 2 min daily.","1x2min"],["Wrist Extension Stretch","Arm straight, palm down, pull fingers toward you. 30s.","3x30s"],["Eccentric Wrist Lowering","2-3lb, wrist extended, slowly lower over 4s.","3x10"],["Grip to Open","Fist then fully extend fingers. Activates radial nerve pathway.","3x20"]],mods:[["Bench press","Cable chest press (neutral grip), machine chest press, or DB neutral + wraps"],["Shoulder press","Cable lateral raises, machine shoulder press neutral, or band pull-aparts"],["Tricep pushdowns","Neutral grip cable extensions or machine tricep work"],["Pulling (rows, pulldowns)","KEEP, wrist brace on left, monitor right elbow"]]},4:{steps:["Jarrett assesses each body region, get verbal confirmation before adding any restricted movement","One new movement per week max, do not stack multiple simultaneously","Monitor for nerve symptoms (tingling, numbness, shooting pain), regress if present","EM therapy device continues as maintenance throughout"]}};
const INJURIES=[{area:"Right Foot",title:"Nerve Entrapment & Gait Compensation",details:["Fracture sites: metatarsals + tibia/fibula, ~2 years ago","Nerve pathway in navicular entrapped in scar tissue","Peroneal and medial plantar nerves sensitized","Ankle self-mobilized with audible pop, immediate relief","Now walks more flat-footed post-mobilization","Lateral malleolus and cuboid toward pinky toe involved"],warnings:["Occasional tingling while walking, nerve sensitized not resolved","No high-impact until Phase 2 clears"]},{area:"Left Hip, Pelvis & Lumbar",title:"Compensation Overload",details:["Primary compensator for 2 years, chronically overloaded","Snapping hip syndrome (coxa saltans) confirmed","Proximal hamstring tendon overloaded at sit bone","Pelvis anteriorly tilted and hiked on left","SI joint hypermobile, popping and grinding","Lumbar nerve root compressed L4-L5/L5-S1","Pelvic realignment completed, pelvis dropped to neutral"],warnings:["Sciatica active: full-length nerve symptoms when hip externally rotated","No cross-legged sitting, no deep loaded hip flexor stretches"]},{area:"Left Wrist",title:"TFCC Tear & Structural Instability",details:["Dirt bike fracture ~7-8 years ago, healed crookedly","TFCC tear confirmed by orthopedic hand specialist","Compromised blood vessels, deteriorating ulnar styloid","Radius and ulna touching at distal end (reduced joint space)","DRUJ instability, wrist dislocates under testing","Cortisone injection with partial relief","Wrist droops into ulnar deviation without active support"],warnings:["NO pressing, bench, shoulder press, or loaded rotation until cleared","Most structurally complex injury","Ulnar styloid actively deteriorating"]},{area:"Right Elbow",title:"Surgical Scar Tissue & Radial Nerve Entrapment",details:["Ceramic tile laceration 3-4 years ago, repaired to bone level","Scar tissue described as 'like concrete'","Radial nerve entrapped during healing","Involuntary middle finger flicking under electrical stimulation","Extensor tendons restricted by scar adhesions","Pain radiates down forearm during gripping/pressing","EM therapy responding: less tight, more flexible"],warnings:["No heavy tricep work","No close-grip pressing","Elbow flaring/shaking = mechanical limit signal, STOP"]}];
const DEVICE=[{area:"Right Foot",mode:"Mode 4 (Cupping)",int:"8-12/20",dur:"15-20 min",freq:"3x/week",p1:"Bottom of foot, horizontal across arch",p2:"Top of foot, vertical near navicular",pos:"Lying/seated. Dorsiflexion produces best nerve response.",ph:1,fb:["All 4 toes moving in sync = correct nerve trunk contact","Pain migration navicular to cuneiform to cuboid = productive","STOP if tingling does not ease after 5 min"]},{area:"Lumbar/Pelvis",mode:"Mode 4 (Cupping)",int:"12/20",dur:"15-20 min",freq:"2x/week",p1:"Lower back at lumbar pain point",p2:"Left SI joint, base of spine/pelvis",pos:"Lying on back",ph:2,fb:["Intensity 15 too aggressive, 12 confirmed range","Bicycle leg movement accelerates pelvic realignment","Popping/pulling in lumbar = joint releasing (productive)","Tingling down left leg = nerve conducting (productive)","STOP if calf numb and not resolving within 2 min"]},{area:"Left Wrist",mode:"Mode 2 (Acupressure)",int:"2-3/20 MAX",dur:"10-15 min",freq:"2x/week",p1:"Pinky side at TFCC pain point",p2:"2-3in up forearm ulnar side",pos:"Wrist neutral, supported. Use brace if needed.",ph:3,fb:["Goal: circulation and inflammation reduction ONLY","Do NOT exceed intensity 3","Do NOT use Mode 4 on wrist","STOP IMMEDIATELY if cramping in ring finger/pinky","No rotation or extension during session"]},{area:"Right Elbow",mode:"Mode 2 (Acupressure)",int:"2/20",dur:"15-20 min",freq:"2x/week (ongoing ALL phases)",p1:"Over scar line, lateral elbow",p2:"Inner forearm 2-3in below crease",pos:"Arm supported, elbow relaxed",ph:0,fb:["Bee-sting/tattoo sensation = scar activating (productive)","Stabbing then easing = scar releasing, stay with it","Middle finger flicking = radial nerve, reduce intensity","Warmth = blood flow increasing (positive)","Complete when sharp transitions to warm diffuse feeling"]}];
const MODES=[[2,"Acupressure","Circulation and gentle nerve stim. Primary for wrist and elbow."],[3,"Tapping","Blood flow, flushes inflammation. Best for lumbar."],[4,"Cupping","Deep scar tissue, lumbar decompression. Most powerful."],[5,"Hot Stone","Longest contraction. Deep rolling massage. Cooldown."],[11,"Extremity Pain","Starting mode for new areas. Diagnostic baseline."],[12,"Atlas","Phase 4 ONLY. Muscle confusion, athletic enhancement."]];
const RED_FLAGS=[["Wrist","Joint dislocation sensation, sharp pain increase, or new swelling"],["Foot","Tingling while walking becoming daily/constant rather than occasional"],["Sciatica","Numbness not resolving within 30 min of lying flat"],["Elbow","Lost grip strength or cannot fully extend fingers after session"],["Any Area","Sharp electric pain during device session not settling within 2 min of stopping"]];
const RULES=[["PT takes priority","Do not compress or drop PT work to fit primary training. Compress primary training first."],["Do not fill in gaps","If any input missing or unclear, stop and ask Jarrett before building."],["Strict sequential phases","Do not load a later area until Jarrett confirms prior phase cleared."],["Flag conflicts","If template movement conflicts with phase restriction, replace with alternative. If no alternative listed, flag Jarrett."],["Recovery = PT load","Align recovery days with PT protocol load, not just training fatigue."],["Conditioning respects restrictions","Only modalities that do not load restricted areas in the active phase."],["Nutrition is directional","Guidelines, not rigid meal plans, unless Jarrett directs otherwise."],["Sleep is context only","Note as recovery guideline. No training timing gates at this stage."],["When unsure: STOP","Flag Jarrett with specific question. Do not approximate on PT protocol or injury areas."],["Jarrett operates device","VA schedules sessions and ensures feedback is tracked."],["Never stack device sessions","Min 4 hours between sessions on different areas. Always log feedback."]];
const CHAIN=["Right foot guarded/underloaded 2 years","Body shifts weight to left side","Spine compensates shifting rightward","Left hip/glute chronically overloaded","Left knee internally rotated","Lumbar compressed left side L4-L5/L5-S1","Sciatic nerve compressed at root"];
const ALL_TABS=["Home","Phases","Train","Injuries","Device","Log","Rules","Settings"];

// ━━━━ STATE ━━━━
function makeDefault(){return{currentPhase:1,phaseHistory:[],sleepTarget:"",calorieTarget:"",proteinTarget:"",carbFatApproach:"",supplements:"",trackingTool:"",newInjuries:"",turnaround:"48 hours",sessions:[],exerciseLogs:[],clearedMovements:[],version:"1.0",lastUpdated:new Date().toISOString()}}
let st,role,tab="Home",logT="device",cfm=null,exComp=[];
function load(){try{st=JSON.parse(localStorage.getItem("jt-web"))||makeDefault()}catch(e){st=makeDefault()}role=localStorage.getItem("jt-role")||null}
function saveState(){st.lastUpdated=new Date().toISOString();try{localStorage.setItem("jt-web",JSON.stringify(st))}catch(e){}}
function saveRole(r){role=r;try{localStorage.setItem("jt-role",r)}catch(e){}}
function fmtD(d){try{return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"})}catch(e){return"-"}}
function getToday(){return new Date().toISOString().split("T")[0]}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
let toastT;function flash(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),2300)}

// ━━━━ RENDER ━━━━
function render(){const app=document.getElementById("app");if(!role){app.innerHTML=renderRole();return}const isO=role==="owner",ph=st.currentPhase||1,pi=PHASES[ph-1],tabs=isO?ALL_TABS:ALL_TABS.filter(t=>t!=="Settings");
let h=`<div class="hdr"><div style="display:flex;align-items:center;gap:10px"><span style="font-family:var(--fm);font-size:12px;letter-spacing:3px;color:#666;font-weight:700">JARRETT</span><span class="pbadge">PHASE ${ph}</span></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;font-family:var(--fm);color:#333">v${esc(st.version)}</span><button class="sw" onclick="role=null;render()">${isO?"OWNER":"JARRETT"}</button></div></div>`;
h+=`<div class="nav">${tabs.map(t=>`<button class="${tab===t?"on":""}" onclick="tab='${t}';render()">${t}</button>`).join("")}</div>`;
h+=`<div class="body">`;
if(tab==="Home")h+=renderHome(ph,pi);
else if(tab==="Phases")h+=renderPhases(ph,isO);
else if(tab==="Train")h+=renderTrain(ph,pi);
else if(tab==="Injuries")h+=renderInjuries();
else if(tab==="Device")h+=renderDevice(ph);
else if(tab==="Log")h+=renderLog(ph);
else if(tab==="Rules")h+=renderRules();
else if(tab==="Settings"&&isO)h+=renderSettings();
h+=`</div>`;app.innerHTML=h}

function renderRole(){return`<div class="mid"><div style="text-align:center"><div style="font-size:10px;font-family:var(--fm);letter-spacing:5px;color:#444;margin-bottom:16px">RECOVERY AND TRAINING SYSTEM</div><h1 style="font-size:48px;font-weight:700;letter-spacing:-2px;margin:0 0 8px;color:#f0f0f0">JARRETT</h1><p style="color:#555;font-size:13px;max-width:360px;margin:0 auto 44px;line-height:1.6">Phased recovery protocol integrating PT sequencing, training, electromagnetic therapy, nutrition, and sleep as one system.</p><div class="fb" style="justify-content:center;gap:16px"><button class="role-btn ow" onclick="saveRole('owner');tab='Home';render()"><div style="font-size:10px;font-family:var(--fm);letter-spacing:3px;color:var(--gd);margin-bottom:8px">OWNER</div><div style="font-size:16px;font-weight:600">Queene Access</div><div style="font-size:12px;color:#666;margin-top:8px;line-height:1.4">Phase control, settings, injury inputs, system rules, full logs</div></button><button class="role-btn jr" onclick="saveRole('jarrett');tab='Home';render()"><div style="font-size:10px;font-family:var(--fm);letter-spacing:3px;color:var(--bl);margin-bottom:8px">JARRETT</div><div style="font-size:16px;font-weight:600">Athlete Access</div><div style="font-size:12px;color:#666;margin-top:8px;line-height:1.4">View protocol, log sessions, track progress, injury reference</div></button></div></div></div>`}

function renderHome(ph,pi){const ss=st.sessions||[],el=st.exerciseLogs||[],now=Date.now(),wk=ss.filter(s=>{try{return(now-new Date(s.date).getTime())/864e5<=7}catch(e){return false}}).length;
let h=`<div class="card" style="border-left:3px solid var(--gd)"><div class="lbl">CURRENT PHASE</div><h2 style="font-size:19px;font-weight:600;margin:6px 0 4px">Phase ${ph} - ${esc(pi.area)}</h2><p style="color:var(--t2);font-size:13px;margin:4px 0 0;line-height:1.5">${esc(pi.goal)}</p><div style="margin-top:12px;padding:10px 14px;background:#080808;border-radius:6px"><div style="font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--t3)">ADVANCEMENT GATE</div><p style="margin:5px 0 0;color:#999;font-size:13px">${esc(pi.gate)}</p></div><div class="warn" style="margin-top:10px">${esc(pi.warning)}</div></div>`;
h+=`<div class="grid4" style="margin-bottom:14px">${[[ss.length,"DEVICE"],[el.length,"EXERCISE"],[wk,"THIS WEEK"],[ph+"/4","PHASE"]].map(x=>`<div class="card" style="text-align:center;padding:14px 8px"><div style="font-size:22px;font-weight:700;font-family:var(--fm)">${x[0]}</div><div style="font-size:8px;font-family:var(--fm);letter-spacing:2px;color:var(--t3);margin-top:3px">${x[1]}</div></div>`).join("")}</div>`;
h+=`<div class="fb" style="margin-bottom:14px"><button class="btn" style="flex:1;min-width:120px;text-align:center" onclick="tab='Log';logT='device';render()">+ Device Session</button><button class="btn btn-bl" style="flex:1;min-width:120px;text-align:center" onclick="tab='Log';logT='exercise';render()">+ Exercise Log</button></div>`;
h+=`<div class="card" style="border-left:3px solid #8a3a3a"><div class="lbl" style="color:var(--am)">RED FLAGS - STOP ALL PROTOCOLS AND ESCALATE</div>${RED_FLAGS.map((r,i)=>`<div style="font-size:12px;padding:6px 0;border-bottom:${i<RED_FLAGS.length-1?"1px solid #151515":"none"};color:var(--rd);line-height:1.4"><span style="font-family:var(--fm);font-size:9px;color:var(--t3);margin-right:6px">${esc(r[0].toUpperCase())}</span>${esc(r[1])}</div>`).join("")}</div>`;
h+=`<div class="card"><div class="lbl">GLOBAL RESTRICTIONS - ALL PHASES</div>${GLOBAL_R.map((r,i)=>`<div style="padding:5px 0;border-bottom:${i<GLOBAL_R.length-1?"1px solid #141414":"none"};font-size:12px"><div style="color:var(--rd)">x ${esc(r.m)}</div><div style="color:var(--t3);font-size:11px;margin-top:2px">${esc(r.r)}</div></div>`).join("")}</div>`;
return h}

function renderPhases(ph,isO){let h=`<div class="lbl">PHASE PROGRESSION - STRICT SEQUENTIAL</div><div style="display:flex;gap:4px;margin:10px 0 20px">${PHASES.map(p=>`<div style="flex:1;height:6px;border-radius:3px;background:${p.id<ph?"#2a6b4a":p.id===ph?"var(--g)":"#181818"}"></div>`).join("")}</div>`;
PHASES.forEach(p=>{const cur=p.id===ph,clr=p.id<ph,lck=p.id>ph;
h+=`<div class="card" style="border-left:3px solid ${cur?"var(--g)":clr?"#2a6b4a":"var(--b2)"};opacity:${lck?.4:1}"><span style="font-size:10px;font-family:var(--fm);letter-spacing:2px;color:${clr?"#2a6b4a":cur?"var(--g)":"var(--t4)"}">${clr?"CLEARED":cur?"ACTIVE":"LOCKED"}</span><h3 style="font-size:15px;font-weight:600;margin:4px 0 2px">Phase ${p.id} - ${esc(p.area)}</h3><p style="color:#777;font-size:12px;margin:2px 0">${esc(p.goal)}</p><div style="margin-top:6px;font-size:12px;color:#666">Gate: ${esc(p.gate)}</div><div style="font-size:12px;color:#666">Include: ${esc(p.include)}</div>`;
if(cur){h+=`<div style="margin-top:10px"><div style="font-family:var(--fm);font-size:9px;letter-spacing:1px;color:var(--am);margin-bottom:4px">RESTRICTIONS</div>${(PHASE_R[p.id]||[]).map(r=>`<div style="padding:4px 0;font-size:12px;display:flex;gap:8px"><div style="color:var(--rd);flex:1">x ${esc(r[0])}</div>${r[1]?`<div style="color:var(--g);flex:1;font-size:11px">Alt: ${esc(r[1])}</div>`:""}</div>`).join("")}</div><div class="warn" style="margin-top:8px">${esc(p.warning)}</div>`;
if(isO&&p.id<4){if(cfm!=="adv"){h+=`<button class="btn" style="margin-top:14px" onclick="cfm='adv';render()">Advance to Phase ${p.id+1}</button>`}else{h+=`<div style="margin-top:14px;padding:14px;background:#080808;border-radius:6px;border:1px solid var(--gB)"><p style="font-size:12px;color:#aaa;margin:0 0 8px;font-weight:600">Phase Advancement Protocol (Owner Framework Sec 3)</p><label class="ilbl">Cleared movements now available:</label><textarea class="ta" rows="3" id="adv-cleared" placeholder="Which movements are now cleared..."></textarea><div style="margin-top:8px"><label class="ilbl" style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="adv-ok"><span>I confirm Phase ${p.id} produced measurable improvement</span></label></div><div class="fb" style="margin-top:12px"><button class="btn" onclick="doAdvance(${p.id})">Yes, advance</button><button class="btn btn-c" onclick="cfm=null;render()">Cancel</button></div></div>`}}}
h+=`</div>`});
if((st.clearedMovements||[]).filter(Boolean).length>0){h+=`<div class="card"><div class="lbl" style="color:#2a6b4a">CLEARED MOVEMENTS LOG</div>${st.clearedMovements.filter(Boolean).map(m=>`<div style="font-size:12px;color:#999;padding:4px 0;border-bottom:1px solid #141414">${esc(m)}</div>`).join("")}</div>`}
return h}

function doAdvance(pid){const c=document.getElementById("adv-cleared"),ok=document.getElementById("adv-ok");if(!ok||!ok.checked){flash("Please confirm measurable improvement");return}const cleared=c?c.value:"";st.phaseHistory=st.phaseHistory||[];st.phaseHistory.push({phase:pid,clearedAt:new Date().toISOString(),status:"cleared",movements:cleared});st.currentPhase=pid+1;st.version=(parseFloat(st.version)+.1).toFixed(1);st.clearedMovements=[...(st.clearedMovements||[]),cleared];saveState();cfm=null;flash("Advanced to Phase "+(pid+1));render()}

function renderExCard(name,detail,rep){return`<div class="card"><div style="display:flex;justify-content:space-between"><div style="font-weight:600;font-size:13px">${esc(name)}</div><div style="font-family:var(--fm);font-size:10px;color:var(--t3)">${esc(rep)}</div></div><div style="color:var(--t2);font-size:12px;margin-top:4px;line-height:1.5">${esc(detail)}</div></div>`}

function renderTrain(ph,pi){let h=`<div class="lbl">PHASE ${ph} PROTOCOL</div><h2 style="font-size:18px;font-weight:600;margin:6px 0 4px">${esc(pi.area)}</h2><p style="color:#777;font-size:13px;margin:4px 0 18px;line-height:1.5">${esc(pi.goal)}</p>`;
if(ph<=2){h+=`<div class="lbl" style="color:var(--gd);margin-bottom:8px">STRETCHES - DAILY</div>${(EX[ph].s||[]).map(s=>renderExCard(s[0],s[1],s[2])).join("")}<div class="lbl" style="color:var(--bl);margin-top:20px;margin-bottom:8px">EXERCISES</div>${(EX[ph].e||[]).map(e=>renderExCard(e[0],e[1],e[2])).join("")}`}
if(ph===3){h+=`<div class="warn" style="margin-bottom:14px">No pressing. No loaded wrist extension. No rotation under load. Wear full immobilization brace during all upper body training.</div><div class="lbl" style="color:var(--bl);margin-bottom:8px">LEFT WRIST PROTOCOL</div>${EX[3].wrist.map(s=>renderExCard(s[0],s[1],s[2])).join("")}<div class="lbl" style="color:var(--am);margin-top:20px;margin-bottom:8px">RIGHT ELBOW PROTOCOL</div>${EX[3].elbow.map(e=>renderExCard(e[0],e[1],e[2])).join("")}<div class="lbl" style="color:#8a7a4a;margin-top:20px;margin-bottom:8px">UPPER BODY MODIFICATIONS</div>${EX[3].mods.map(m=>`<div class="card"><div style="font-size:11px;color:var(--am);font-family:var(--fm)">REPLACE: ${esc(m[0])}</div><div style="font-size:13px;color:#aaa;margin-top:5px;line-height:1.4">${esc(m[1])}</div></div>`).join("")}`}
if(ph===4){h+=`<div class="lbl" style="color:var(--g);margin-bottom:8px">REINTEGRATION PROTOCOL</div>${EX[4].steps.map(s=>`<div class="card"><div style="font-size:13px;color:#999;line-height:1.5">${esc(s)}</div></div>`).join("")}`}
h+=`<div class="card" style="border-left:3px solid #8a3a3a"><div class="lbl" style="color:var(--am)">CURRENT RESTRICTIONS - PHASE ${ph}</div>${(PHASE_R[ph]||[]).map(r=>`<div style="padding:4px 0;font-size:12px"><span style="color:var(--rd)">x ${esc(r[0])}</span>${r[1]?`<span style="color:var(--g);margin-left:8px;font-size:11px">Alt: ${esc(r[1])}</span>`:""}</div>`).join("")}</div>`;
h+=`<div class="card"><div class="lbl">PRIORITY RULE</div><p style="font-size:12px;color:#999;margin:6px 0 0;line-height:1.5">PT movements take priority. Do not compress or drop PT work. Compress primary training first. Recovery days align with PT protocol load, not just training fatigue.</p></div>`;
return h}

function renderInjuries(){let h=`<div class="lbl">FULL INJURY REFERENCE</div><p style="font-size:12px;color:#666;margin:6px 0 16px;line-height:1.5">Every injury on the left side is downstream from the right foot guarding pattern.</p>`;
INJURIES.forEach(inj=>{h+=`<div class="card" style="border-left:3px solid var(--am)"><div style="font-family:var(--fm);font-size:10px;letter-spacing:2px;color:var(--am);margin-bottom:4px">${esc(inj.area.toUpperCase())}</div><h3 style="font-size:15px;font-weight:600;margin:0 0 10px">${esc(inj.title)}</h3>${inj.details.map(d=>`<div style="font-size:12px;color:#999;padding:3px 0;line-height:1.5">- ${esc(d)}</div>`).join("")}<div class="warn" style="margin-top:10px">${inj.warnings.map(w=>`<div style="padding:2px 0">${esc(w)}</div>`).join("")}</div></div>`});
h+=`<div class="card"><div class="lbl">COMPENSATION CHAIN</div>${CHAIN.map((c,i)=>`<div style="font-size:12px;color:#999;padding:3px 0">${i+1}. ${esc(c)}</div>`).join("")}</div>`;
return h}

function renderDevice(ph){let h=`<div class="lbl">ELECTROMAGNETIC THERAPY PROTOCOLS</div><p style="font-size:11px;color:var(--am);margin:6px 0 16px">Never stack sessions same day. Min 4hr between areas. Always log feedback.</p>`;
DEVICE.forEach(d=>{const act=d.ph===0||d.ph<=ph;
h+=`<div class="card" style="border-left:3px solid ${act?"var(--gd)":"#2a2a2a"};opacity:${act?1:.35}"><div style="display:flex;justify-content:space-between"><h3 style="font-size:14px;font-weight:600;margin:0">${esc(d.area)}</h3><span style="font-size:10px;font-family:var(--fm);color:var(--gd)">${esc(d.freq)}</span></div><div class="grid2" style="margin-top:10px;font-size:12px"><div><span style="color:var(--t3)">Mode: </span><span style="color:#ccc">${esc(d.mode)}</span></div><div><span style="color:var(--t3)">Intensity: </span><span style="color:#ccc">${esc(d.int)}</span></div><div><span style="color:var(--t3)">Duration: </span><span style="color:#ccc">${esc(d.dur)}</span></div></div><div style="margin-top:8px;font-size:12px"><div style="color:var(--t3)">Position: <span style="color:#aaa">${esc(d.pos)}</span></div><div style="color:var(--t3);margin-top:4px">Pads:</div><div style="color:#aaa">1: ${esc(d.p1)}</div><div style="color:#aaa">2: ${esc(d.p2)}</div></div>${act?`<div style="margin-top:10px;padding:8px 12px;background:#080808;border-radius:5px"><div style="font-family:var(--fm);font-size:9px;letter-spacing:1px;color:var(--t3);margin-bottom:4px">FEEDBACK GUIDE</div>${d.fb.map(f=>{const w=f.includes("STOP")||f.includes("Do NOT");return`<div style="font-size:11px;color:${w?"var(--rd)":"var(--t2)"};padding:2px 0;line-height:1.4">${w?"! ":"> "}${esc(f)}</div>`}).join("")}</div>`:""}</div>`});
h+=`<div class="card" style="border-left:3px solid var(--am)"><div class="lbl">MODE REFERENCE</div>${MODES.map((m,i)=>`<div style="padding:7px 0;border-bottom:${i<MODES.length-1?"1px solid #141414":"none"};font-size:12px;line-height:1.4"><span style="font-family:var(--fm);font-size:10px;color:var(--am);margin-right:6px">M${m[0]}</span><strong style="color:#ccc">${esc(m[1])}</strong><span style="color:#666;margin-left:6px"> - ${esc(m[2])}</span></div>`).join("")}</div>`;
return h}

function getExNames(ph){if(ph<=2)return[...(EX[ph].s||[]).map(x=>x[0]),...(EX[ph].e||[]).map(x=>x[0])];if(ph===3)return[...EX[3].wrist.map(x=>x[0]),...EX[3].elbow.map(x=>x[0])];return["Movement Reintroduction"]}

function renderLog(ph){let h=`<div class="fb" style="margin-bottom:18px"><button class="tgl${logT==="device"?" on":""}" style="flex:1;text-align:center" onclick="logT='device';render()">Device Session</button><button class="tgl${logT==="exercise"?" on":""}" style="flex:1;text-align:center" onclick="logT='exercise';render()">Exercise Log</button></div>`;
if(logT==="device"){h+=`<div class="card"><div class="lbl">LOG DEVICE SESSION</div><div class="grid2" style="margin-top:12px"><div><label class="ilbl">Date</label><input class="inp" type="date" id="ld" value="${getToday()}"></div><div><label class="ilbl">Area</label><select class="sel" id="la">${["Right Foot","Lumbar/Pelvis","Left Wrist","Right Elbow"].map(a=>`<option>${a}</option>`).join("")}</select></div><div><label class="ilbl">Mode</label><input class="inp" id="lm" placeholder="e.g. Mode 4 Cupping"></div><div><label class="ilbl">Intensity</label><input class="inp" id="li" placeholder="e.g. 12/20"></div></div><div style="margin-top:10px"><label class="ilbl">Duration</label><input class="inp" id="ldu" placeholder="e.g. 15 min"></div><div style="margin-top:10px"><label class="ilbl">Feedback / Sensations</label><textarea class="ta" rows="3" id="lf" placeholder="Pain migration, tingling, warmth..."></textarea></div><div style="margin-top:10px"><label class="ilbl">Next Day Notes</label><textarea class="ta" rows="2" id="ln" placeholder="How did the area feel next day?"></textarea></div><button class="btn" style="margin-top:14px;width:100%;text-align:center" onclick="submitDev()">Save Device Session</button></div>`}
else{const names=getExNames(ph);h+=`<div class="card"><div class="lbl">LOG EXERCISE - PHASE ${ph}</div><div style="margin-top:10px"><label class="ilbl">Date</label><input class="inp" type="date" id="exd" value="${getToday()}" style="max-width:200px"></div><div style="margin-top:12px"><label class="ilbl">Tap completed exercises</label><div class="fb" style="margin-top:6px">${names.map(n=>`<button class="chip${exComp.includes(n)?" on":""}" onclick="toggleEx('${esc(n)}')">${exComp.includes(n)?"* ":""}${esc(n)}</button>`).join("")}</div></div><div style="margin-top:12px"><label class="ilbl">Notes</label><textarea class="ta" rows="3" id="exn" placeholder="How did it feel?"></textarea></div><button class="btn btn-bl" style="margin-top:14px;width:100%;text-align:center" onclick="submitEx(${ph})">Save Exercise Log</button></div>`}
// History
const all=[...(st.sessions||[]).map(s=>({...s,_t:"d"})),...(st.exerciseLogs||[]).map(s=>({...s,_t:"e"}))].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,25);
h+=`<div class="card"><div class="lbl">SESSION HISTORY</div>${all.length===0?`<p style="color:var(--t4);font-size:12px;margin-top:8px">No sessions logged yet.</p>`:all.map(s=>`<div class="sess"><div class="sess-h"><span>${s._t==="e"?`<span class="tag" style="color:var(--bl)">EX</span>Phase ${s.phase||"?"} - ${(s.completed||[]).length} done`:`<span class="tag" style="color:var(--gd)">DEV</span>${esc(s.area||"")} ${esc(s.mode||"")}`}</span><span style="color:var(--t3)">${fmtD(s.date)}</span></div>${s.feedback?`<div style="color:var(--t3);font-size:11px;margin-top:3px">${esc(s.feedback)}</div>`:""}${s.notes?`<div style="color:var(--t3);font-size:11px;margin-top:3px">${esc(s.notes)}</div>`:""}${s.nextDay?`<div style="color:var(--t4);font-size:11px;margin-top:2px">Next day: ${esc(s.nextDay)}</div>`:""}</div>`).join("")}</div>`;
return h}

function submitDev(){const m=document.getElementById("lm");if(!m||!m.value){flash("Mode is required");return}st.sessions=st.sessions||[];st.sessions.push({date:(document.getElementById("ld")||{}).value||getToday(),area:(document.getElementById("la")||{}).value||"",mode:m.value,intensity:(document.getElementById("li")||{}).value||"",duration:(document.getElementById("ldu")||{}).value||"",feedback:(document.getElementById("lf")||{}).value||"",nextDay:(document.getElementById("ln")||{}).value||"",id:Date.now()});saveState();flash("Device session saved");render()}
function submitEx(ph){st.exerciseLogs=st.exerciseLogs||[];st.exerciseLogs.push({date:(document.getElementById("exd")||{}).value||getToday(),completed:[...exComp],notes:(document.getElementById("exn")||{}).value||"",phase:ph,id:Date.now()});exComp=[];saveState();flash("Exercise log saved");render()}
function toggleEx(n){if(exComp.includes(n))exComp=exComp.filter(x=>x!==n);else exComp.push(n);render()}

function renderRules(){let h=`<div class="lbl">SYSTEM OPERATING RULES</div><p style="font-size:12px;color:#666;margin:6px 0 16px">From Queene SOP, Owner Framework, and Recovery SOP.</p>`;
RULES.forEach(r=>{h+=`<div class="card"><div style="font-weight:600;font-size:13px">${esc(r[0])}</div><div style="color:var(--t2);font-size:12px;margin-top:4px;line-height:1.5">${esc(r[1])}</div></div>`});
h+=`<div class="card" style="border-left:3px solid var(--bl)"><div class="lbl" style="color:var(--bl)">ROUTINE UPDATE PROTOCOL (QUEENE SOP SEC 8)</div><p style="font-size:12px;color:#999;margin:6px 0 0;line-height:1.6">When phase advances or inputs change: 1) Confirm in writing what is changing. 2) Update restriction table. 3) Revise routine. 4) Send to Jarrett for confirmation before going live. 5) Update version and date.</p></div>`;
h+=`<div class="card" style="border-left:3px solid var(--am)"><div class="lbl" style="color:var(--am)">OWNER SIGNAL FORMAT (OWNER FRAMEWORK SEC 3)</div><p style="font-size:12px;color:#999;margin:6px 0 0;line-height:1.6">To advance: 1) State which phase closing out. 2) Confirm which movements now available. 3) Confirm next phase begun. Turnaround: ${esc(st.turnaround||"48 hours")}.</p></div>`;
return h}

function renderSettings(){let h=`<div class="lbl">OWNER SETTINGS - STANDING INPUTS</div><p style="font-size:12px;color:var(--t3);margin:6px 0 16px">Per Owner Framework Sec 2. Update when anything changes.</p>`;
h+=`<div class="card"><div class="lbl" style="color:var(--gd)">NUTRITION (DIRECTIONAL GUIDELINES)</div><div class="grid2" style="margin-top:10px"><div><label class="ilbl">Calories</label><input class="inp" value="${esc(st.calorieTarget||"")}" onchange="st.calorieTarget=this.value;saveState()" placeholder="e.g. 2400"></div><div><label class="ilbl">Protein</label><input class="inp" value="${esc(st.proteinTarget||"")}" onchange="st.proteinTarget=this.value;saveState()" placeholder="e.g. 180g"></div><div><label class="ilbl">Carb/Fat</label><input class="inp" value="${esc(st.carbFatApproach||"")}" onchange="st.carbFatApproach=this.value;saveState()" placeholder="e.g. balanced"></div><div><label class="ilbl">Supplements</label><input class="inp" value="${esc(st.supplements||"")}" onchange="st.supplements=this.value;saveState()" placeholder="e.g. creatine"></div></div><div style="margin-top:10px"><label class="ilbl">Tracking Tool</label><input class="inp" value="${esc(st.trackingTool||"")}" onchange="st.trackingTool=this.value;saveState()" placeholder="MyFitnessPal, manual, none" style="max-width:280px"></div></div>`;
h+=`<div class="card"><div class="lbl" style="color:var(--bl)">SLEEP (RECOVERY GUIDELINE ONLY)</div><div style="margin-top:10px"><label class="ilbl">Target Hours</label><input class="inp" value="${esc(st.sleepTarget||"")}" onchange="st.sleepTarget=this.value;saveState()" placeholder="e.g. 7-8" style="max-width:180px"></div></div>`;
h+=`<div class="card"><div class="lbl" style="color:var(--am)">NEW INJURIES / AGGRAVATIONS</div><textarea class="ta" rows="3" onchange="st.newInjuries=this.value;saveState()" style="margin-top:8px" placeholder="Flag any new injuries since last update...">${esc(st.newInjuries||"")}</textarea></div>`;
h+=`<div class="card"><div class="lbl">SYSTEM</div><div class="grid2" style="margin-top:10px"><div><label class="ilbl">Turnaround</label><input class="inp" value="${esc(st.turnaround||"")}" onchange="st.turnaround=this.value;saveState()" placeholder="48 hours"></div><div><label class="ilbl">Version</label><input class="inp" value="${esc(st.version||"")}" onchange="st.version=this.value;saveState()"></div></div><div style="margin-top:6px;font-size:11px;color:var(--t4)">Last updated: ${st.lastUpdated?new Date(st.lastUpdated).toLocaleString():"-"}</div></div>`;
h+=`<div class="card" style="border-left:3px solid #8a3a3a"><div class="lbl" style="color:var(--am)">DANGER ZONE</div>${cfm!=="reset"?`<button class="btn btn-rd" style="margin-top:8px" onclick="cfm='reset';render()">Reset All Data</button>`:`<div style="margin-top:8px;padding:12px;background:#120808;border-radius:6px;border:1px solid var(--rdB)"><p style="font-size:12px;color:var(--rd);margin:0 0 10px">Erase everything? Cannot be undone.</p><div class="fb"><button class="btn" style="background:#2a1010;color:#ee6666;border-color:#3a1515" onclick="st=makeDefault();saveState();cfm=null;flash('All data reset');render()">Yes, reset</button><button class="btn btn-c" onclick="cfm=null;render()">Cancel</button></div></div>`}</div>`;
return h}

// ━━━━ INIT ━━━━
load();render();
</script>
</body>
</html>
