<title>JARRETT</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#ffffff;--s1:#f9fafb;--s2:#f3f4f6;--s3:#e5e7eb;
--b1:#e5e7eb;--b2:#d1d5db;
--t:#111827;--t2:#4b5563;--t3:#6b7280;--t4:#9ca3af;
--g:#16a34a;--gl:#f0fdf4;--gb:#15803d;--gx:#dcfce7;
--bl:#0284c7;--bll:#f0f9ff;--blb:#0369a1;
--am:#d97706;--aml:#fffbeb;--amb:#92400e;
--rd:#dc2626;--rdl:#fef2f2;--rdb:#991b1b;
--pp:#7c3aed;--ppl:#f5f3ff;--ppb:#5b21b6;
--fm:'DM Mono',monospace;--fb:'Outfit',-apple-system,sans-serif;
--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
--sh2:0 4px 16px rgba(0,0,0,.08);--r:14px
}
body{background:var(--bg);color:var(--t);font-family:var(--fb);min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:var(--fb);cursor:pointer}input,select,textarea{font-family:var(--fb)}
/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);padding:14px 28px;border-radius:14px;font-size:14px;font-weight:700;z-index:999;opacity:0;transition:all .3s;pointer-events:none;max-width:90vw;text-align:center}
#toast.ok{background:var(--gx);border:1px solid #86efac;color:var(--gb);transform:translateX(-50%) translateY(0);opacity:1}
#toast.warn{background:var(--rdl);border:1px solid #fca5a5;color:var(--rdb);transform:translateX(-50%) translateY(0);opacity:1}
#toast.info{background:var(--aml);border:1px solid #fcd34d;color:var(--amb);transform:translateX(-50%) translateY(0);opacity:1}
/* Layout */
.mid{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#f0fdf4 0%,#f0f9ff 50%,#f5f3ff 100%)}
.wrap{max-width:540px;margin:0 auto;width:100%}
.body{padding:16px 16px 100px;background:var(--s1);min-height:calc(100vh - 56px)}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid var(--b1);padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:50;display:flex;justify-content:center}
.bnav-in{display:flex;max-width:540px;width:100%}
.bnav-b{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;color:var(--t4);font-size:10px;font-weight:600;letter-spacing:.5px;transition:color .15s}
.bnav-b.on{color:var(--g)}.bnav-b.on .bnav-ic{background:var(--gl);color:var(--g)}
.bnav-ic{width:36px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
/* Top bar */
.tbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;position:sticky;top:0;z-index:40;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1)}
/* Cards */
.cd{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh)}
.cd-g{border-left:3px solid var(--g)}.cd-r{border-left:3px solid var(--rd)}.cd-b{border-left:3px solid var(--bl)}.cd-a{border-left:3px solid var(--am)}.cd-p{border-left:3px solid var(--pp)}
/* Accordion */
.ac-h{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;padding:2px 0}
.ac-i{color:var(--t4);font-size:11px;transition:transform .2s;font-family:var(--fm);padding:4px}.ac-i.open{transform:rotate(180deg)}
.ac-b{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .2s ease}.ac-b.open{max-height:8000px;opacity:1}
/* Typography */
.lbl{font-size:11px;font-family:var(--fm);letter-spacing:2.5px;color:var(--t4);text-transform:uppercase;margin-bottom:6px;font-weight:500}
.lg{color:var(--g)}.lb{color:var(--bl)}.la{color:var(--am)}.lr{color:var(--rd)}.lp{color:var(--pp)}
.il{display:block;font-size:12px;color:var(--t3);margin-bottom:5px;font-weight:600}
.h1{font-size:28px;font-weight:800;letter-spacing:-.5px}.h2{font-size:20px;font-weight:700}.h3{font-size:15px;font-weight:700}
.sub{color:var(--t2);font-size:14px;line-height:1.7}.dim{color:var(--t3);font-size:13px}
/* Inputs */
.inp,.sel,.ta{width:100%;background:var(--bg);border:1.5px solid var(--b1);border-radius:10px;padding:12px 14px;color:var(--t);font-size:14px;outline:none}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(22,163,74,.08)}.ta{resize:vertical;min-height:56px}.sel{appearance:none}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:700;outline:none;border:none;transition:all .15s;box-shadow:var(--sh)}
.btn:active{transform:scale(.97)}
.bg{background:var(--g);color:#fff}.bb{background:var(--bl);color:#fff}.br{background:var(--rd);color:#fff}.bx{background:var(--bg);color:var(--t3);border:1px solid var(--b1)}
.bf{width:100%;text-align:center;padding:13px}
/* Toggles */
.tg{padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;font-family:var(--fm);border:1.5px solid var(--b1);background:var(--bg);color:var(--t3);outline:none}
.tg.on{background:var(--gl);color:var(--gb);border-color:#86efac}
/* Alerts */
.al{padding:14px 16px;border-radius:12px;margin-bottom:10px;font-size:13px;line-height:1.5;display:flex;gap:12px;align-items:flex-start;font-weight:600;box-shadow:var(--sh)}
.al-r{background:var(--rdl);color:var(--rdb);border:1px solid #fca5a5}
.al-a{background:var(--aml);color:var(--amb);border:1px solid #fcd34d}
.al-g{background:var(--gl);color:var(--gb);border:1px solid #86efac}
/* Badges */
.bdg{display:inline-flex;align-items:center;font-size:11px;padding:4px 10px;border-radius:7px;font-family:var(--fm);font-weight:500}
.bdg-g{background:var(--gx);color:var(--gb)}.bdg-b{background:var(--bll);color:var(--blb)}.bdg-a{background:var(--aml);color:var(--amb)}.bdg-r{background:var(--rdl);color:var(--rdb)}.bdg-p{background:var(--ppl);color:var(--ppb)}
/* Progress */
.pb{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;margin:6px 0}.pbf{height:100%;border-radius:4px;transition:width .6s ease;background:linear-gradient(90deg,var(--g),#4ade80)}
/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.fb{display:flex;gap:8px;flex-wrap:wrap}
/* Mission steps */
.ms{display:flex;gap:14px;padding:14px 16px;border-radius:12px;margin-bottom:6px;border:1.5px solid var(--b1);background:var(--bg);transition:all .25s;cursor:pointer;align-items:center;box-shadow:var(--sh)}
.ms:active{transform:scale(.985)}.ms.done{border-color:#86efac;background:var(--gl);box-shadow:none}
.ms-n{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:var(--fm);flex-shrink:0;border:2px solid var(--b1);color:var(--t4);background:var(--s1)}
.ms.done .ms-n{background:var(--g);border-color:var(--g);color:#fff;font-size:16px;animation:msCheck .35s}
.ms-body{flex:1;min-width:0}.ms-t{font-weight:700;font-size:14px}.ms.done .ms-t{color:var(--gb);text-decoration:line-through;text-decoration-color:rgba(22,163,74,.3)}
.ms-d{font-size:12px;color:var(--t3);margin-top:2px}
@keyframes msCheck{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.3)}100%{transform:scale(1)}}
/* Stat blocks */
.stat{text-align:center;padding:14px 8px;background:var(--bg);border-radius:12px;border:1px solid var(--b1);box-shadow:var(--sh)}
.stat-v{font-size:18px;font-weight:800;font-family:var(--fm)}.stat-l{font-size:9px;color:var(--t4);font-family:var(--fm);letter-spacing:1.5px;margin-top:3px;font-weight:500}
/* Directive */
.dir{padding:20px 22px;border-radius:16px;margin-bottom:14px;background:linear-gradient(135deg,var(--gl),var(--bll));border:1.5px solid #86efac;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(22,163,74,.08)}
.dir.warn{background:linear-gradient(135deg,var(--rdl),var(--aml));border-color:#fca5a5;box-shadow:0 4px 16px rgba(220,38,38,.08)}
.dir.info{background:linear-gradient(135deg,var(--aml),var(--bll));border-color:#fcd34d}
.dir-ic{font-size:22px;margin-bottom:6px}.dir-t{font-size:17px;font-weight:800;color:var(--t);line-height:1.4}.dir-sub{font-size:13px;color:var(--t2);margin-top:5px;line-height:1.5}
/* Streak */
.str{display:flex;gap:6px;justify-content:center;margin:12px 0}
.str-d{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--fm);cursor:pointer;flex-direction:column;gap:1px;transition:all .15s}
.str-d:active{transform:scale(.93)}
.str-on{background:var(--gx);border:2px solid #86efac;color:var(--gb)}
.str-off{background:var(--s2);border:2px solid var(--b1);color:var(--t4)}
.str-now{border-color:var(--g)!important;box-shadow:0 0 0 3px rgba(22,163,74,.12)}
.str-sel{box-shadow:0 0 0 3px rgba(124,58,237,.2)!important;border-color:var(--pp)!important}
.str-dt{font-size:10px;font-weight:500;color:var(--t4)}
/* Macro bar */
.mbar{height:22px;background:var(--s2);border-radius:11px;overflow:hidden;display:flex;margin:6px 0}.mbar-s{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:var(--fm);transition:width .4s}
/* Quick log pills */
.ql{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}.ql::-webkit-scrollbar{display:none}
.ql-b{flex-shrink:0;padding:10px 16px;border-radius:10px;border:1.5px solid var(--b1);background:var(--bg);color:var(--t3);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:var(--sh)}
.ql-b.on{border-color:#86efac;background:var(--gl);color:var(--gb)}
/* Date quick-pick */
.dp{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.dp-b{padding:8px 14px;border-radius:8px;border:1.5px solid var(--b1);background:var(--bg);color:var(--t3);font-size:12px;font-weight:600;cursor:pointer}
.dp-b.on{background:var(--gl);color:var(--gb);border-color:#86efac}
/* Meal slot */
.mslot{padding:10px 14px;border-radius:10px;margin-bottom:6px;border:1px solid var(--b1);background:var(--bg);display:flex;justify-content:space-between;align-items:center}
/* Meal preset grid */
.mp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mp{padding:12px;border-radius:12px;border:1.5px solid var(--b1);background:var(--bg);cursor:pointer;transition:all .15s;text-align:center;box-shadow:var(--sh);position:relative}
.mp:active{transform:scale(.95)}.mp.logged{border-color:#86efac;background:var(--gl)}.mp.logged::after{content:'✓';position:absolute;top:6px;right:8px;font-size:14px;color:var(--gb);font-weight:700}
.mp-ic{font-size:24px;margin-bottom:4px}.mp-n{font-weight:700;font-size:13px;line-height:1.3}.mp-m{font-size:11px;color:var(--t3);margin-top:3px;font-family:var(--fm)}
/* Protein counter */
.pc{display:flex;align-items:center;justify-content:center;gap:16px;padding:20px;background:var(--bg);border:1.5px solid var(--b1);border-radius:14px;margin-bottom:12px;box-shadow:var(--sh)}
.pc-btn{width:44px;height:44px;border-radius:12px;border:2px solid var(--b1);background:var(--s1);color:var(--t);font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;font-family:var(--fm)}
.pc-btn:active{transform:scale(.9);background:var(--gl);border-color:#86efac}
.pc-v{text-align:center}.pc-num{font-size:36px;font-weight:800;font-family:var(--fm)}.pc-lbl{font-size:11px;color:var(--t4);font-family:var(--fm);letter-spacing:2px;margin-top:2px}
/* Setup */
.setup{max-width:480px;margin:0 auto;padding:40px 20px}.setup h2{font-size:22px;font-weight:800;margin-bottom:8px}.setup p{color:var(--t2);margin-bottom:20px}.setup ol{padding-left:20px;margin-bottom:20px;color:var(--t2);line-height:2}
.rb{background:var(--bg);border:1.5px solid var(--b1);border-radius:16px;padding:28px;cursor:pointer;text-align:left;min-width:180px;transition:all .2s;outline:none;box-shadow:var(--sh)}
.rb:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mdl{background:var(--bg);border:1px solid var(--b1);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2)}
/* Session row */
.srow{padding:10px 0;border-bottom:1px solid var(--s2);display:flex;justify-content:space-between;align-items:center;font-size:13px}
.srow:last-child{border-bottom:none}
/* Animations */
@keyframes fadeUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease both}.anim-1{animation-delay:.05s}.anim-2{animation-delay:.1s}.anim-3{animation-delay:.15s}
@media(max-width:600px){.rb{min-width:140px;padding:20px}}
</style>
</head>

h+='<div style="margin-top:12px;padding:12px;background:var(--s1);border-radius:10px"><div style="font-size:12px;font-family:var(--fm);color:var(--t4);letter-spacing:1px;margin-bottom:4px">GATE CRITERIA</div><div style="font-size:14px;font-weight:600">'+PH[ph-1].gt+'</div><div class="dim" style="margin-top:4px">'+PH[ph-1].wr+'</div></div></div>';

// Weight stagnation check

// Training consistency
if(wk7.length<3)vaFlags.push({t:"r",m:"&#128170; Only "+wk7.length+" workouts this week. Check Jarrett's schedule and adjust split if needed."});
var painWarn=wk14.filter(function(w){return +(w.pain||0)>=5});
if(painWarn.length>=2)vaFlags.push({t:"r",m:"&#128680; "+painWarn.length+" sessions with pain 5+/10 in 14 days. Check if exercises need swapping. If same movement 3+ weeks, escalate injury."});

// Supplement stock
if(suppAvg<60)vaFlags.push({t:"a",m:"&#128138; Supplement compliance "+suppAvg+"%. Check stock — flag anything that needs reordering."});

// IF check (rest days only)
var restDayWorkouts=wk7.filter(function(w){
var d=new Date(w.date+"T12:00:00").getDay();return d===0});
// No flag needed, just advisory

// Device compliance
if(!devOk)vaFlags.push({t:"a",m:"&#9889; Device sessions below target this period. "+devDetail.join("; ")+"."});

vaFlags.forEach(function(f){h+=Al(f.t==="r"?"warn":f.t==="a"?"info":"ok",f.m)});

h+='<div style="margin-top:12px;padding:12px;background:var(--s1);border-radius:10px;font-size:12px;color:var(--t3)"><div style="font-weight:700;margin-bottom:6px">VA WEEKLY CHECKLIST</div>';
h+='<div style="padding:3px 0">&#9744; Monday: Review training log, input bodyweight + pain levels</div>';
h+='<div style="padding:3px 0">&#9744; Wednesday: Check protein target compliance (above)</div>';

var recs=[];

'<div style="padding:10px 14px;background:var(--gl);border-radius:10px;margin-bottom:10px;border:1px solid #86efac"><div class="lbl lg" style="margin-bottom:4px">TRAINING DAYS</div><div style="font-size:13px"><strong>Calories:</strong> '+MACRO_RANGES.train.cal+' kcal</div><div style="font-size:13px"><strong>Protein:</strong> '+MACRO_RANGES.train.p+'g (1.2-1.5g/lb) — non-negotiable</div><div style="font-size:13px"><strong>Carbs:</strong> '+MACRO_RANGES.train.c+'g (2-3g/lb)</div><div style="font-size:13px"><strong>Fats:</strong> '+MACRO_RANGES.train.f+'g (0.4-0.6g/lb)</div></div>'+
'<div style="padding:10px 14px;background:var(--bll);border-radius:10px;margin-bottom:12px;border:1px solid #93c5fd"><div class="lbl lb" style="margin-bottom:4px">REST DAYS</div><div style="font-size:13px"><strong>Calories:</strong> '+MACRO_RANGES.rest.cal+' kcal</div><div style="font-size:13px"><strong>Protein:</strong> '+MACRO_RANGES.rest.p+'g — same as training</div><div style="font-size:13px"><strong>Carbs:</strong> '+MACRO_RANGES.rest.c+'g (reduce 30-40%)</div><div style="font-size:13px"><strong>Fats:</strong> '+MACRO_RANGES.rest.f+'g — same</div></div>'+

'<div style="padding:6px 0;font-size:13px"><strong style="color:var(--amb)">2. Clean Bulk</strong> — Target 200-400 cal surplus on training days. If weight not increasing after 2 weeks → add 200-300 kcal from carbs.</div>'+
'<div style="padding:6px 0;font-size:13px"><strong style="color:var(--amb)">3. Meal Timing</strong> — Pre-workout (60-90min): 40-60g carbs + 20-30g protein. Post-workout (30-60min): 60-100g fast carbs + 30-40g protein + creatine. Before bed: casein/cottage cheese.</div>'+

'<div style="padding:8px 12px;background:var(--rdl);border-radius:8px;margin-top:8px;font-size:12px;color:var(--rdb)"><strong>VA CHECK (Wednesday):</strong> Did Jarrett hit protein target? If not → send grocery list. If weight stagnant/dropping → not enough calories.</div>'
,false);
h+=A("ref-meals","&#127860; Meal Timing Guide",MEALS.map(function(m){return'<div class="mslot"><div><div style="font-size:11px;font-family:var(--fm);color:var(--t4)">'+m.t+' &middot; '+m.m+'</div><div style="font-weight:600;font-size:13px;margin-top:2px">'+m.n+'</div><div style="font-size:12px;color:var(--t3)">'+m.tip+'</div></div></div>'}).join(""),false);

function doAdv(pid){var ok=document.getElementById("adv-ok");if(!ok||!ok.checked){fl("Confirm improvement","warn");return}D.phaseHistory=(D.phaseHistory||[]);D.phaseHistory.push({phase:pid,clearedAt:new Date().toISOString(),movements:(document.getElementById("adv-c")||{}).value||""});D.currentPhase=pid+1;sv();cfm=null;done={ex:[],dv:[],date:td()};svDone();fl("Phase "+(pid+1)+" active");render()}
