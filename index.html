<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Jarrett Recovery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--s1:#f8f9fa;--s2:#f0f1f3;--b1:#e5e7eb;--b2:#d1d5db;--t:#111827;--t2:#4b5563;--t3:#6b7280;--t4:#9ca3af;--g:#16a34a;--gl:#dcfce7;--gb:#14532d;--bl:#0284c7;--bll:#dbeafe;--blb:#0c4a6e;--am:#d97706;--aml:#fef3c7;--amb:#78350f;--rd:#dc2626;--rdl:#fee2e2;--rdb:#7f1d1d;--pp:#7c3aed;--ppl:#ede9fe;--ppb:#4c1d95;--fm:'JetBrains Mono',monospace;--fb:'Inter',-apple-system,sans-serif;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--sh2:0 4px 12px rgba(0,0,0,.08);--r:12px}
body{background:var(--bg);color:var(--t);font-family:var(--fb);min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:var(--fb)}
/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);padding:16px 32px;border-radius:14px;font-size:15px;font-weight:700;z-index:999;opacity:0;transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.12);max-width:90vw;text-align:center}
#toast.ok{background:var(--gl);border:1px solid #86efac;color:var(--gb);transform:translateX(-50%) translateY(0);opacity:1}
#toast.warn{background:var(--rdl);border:1px solid #fca5a5;color:var(--rdb);transform:translateX(-50%) translateY(0);opacity:1}
#toast.info{background:var(--aml);border:1px solid #fcd34d;color:var(--amb);transform:translateX(-50%) translateY(0);opacity:1}
/* Layout */
.mid{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#f0fdf4 0%,#eff6ff 50%,#faf5ff 100%)}
.wrap{max-width:620px;margin:0 auto}
.hdr{background:var(--bg);border-bottom:1px solid var(--b1);padding:12px 20px;position:sticky;top:0;z-index:50}
.hdr-in{display:flex;align-items:center;justify-content:space-between}
.nav-w{background:var(--bg);border-bottom:1px solid var(--b1);position:sticky;top:49px;z-index:49}
.nav{display:flex;overflow-x:auto;scrollbar-width:none;gap:0;padding:0 4px}
.nav::-webkit-scrollbar{display:none}
.nb{background:none;border:none;border-bottom:2.5px solid transparent;color:var(--t4);padding:11px 12px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;outline:none;transition:all .15s}
.nb:hover{color:var(--t3)}.nb.on{color:var(--g);border-bottom-color:var(--g)}
.body{padding:24px 18px 120px;background:var(--s1);min-height:calc(100vh - 100px)}
/* Cards */
.cd{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:20px 22px;margin-bottom:14px;box-shadow:var(--sh);transition:box-shadow .15s}
.cd:hover{box-shadow:var(--sh2)}
.cd-g{border-left:3px solid var(--g)}.cd-r{border-left:3px solid var(--rd)}.cd-b{border-left:3px solid var(--bl)}.cd-a{border-left:3px solid var(--am)}.cd-p{border-left:3px solid var(--pp)}
/* Accordion */
.ac-h{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;padding:4px 0}
.ac-i{color:var(--t4);font-size:10px;transition:transform .2s;font-family:var(--fm);padding:4px}.ac-i.open{transform:rotate(180deg)}
.ac-b{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .2s ease}.ac-b.open{max-height:6000px;opacity:1}
/* Type */
.lbl{font-size:11px;font-family:var(--fm);letter-spacing:2.5px;color:var(--t4);text-transform:uppercase;margin-bottom:6px;font-weight:700}
.lg{color:var(--g)}.lb{color:var(--bl)}.la{color:var(--am)}.lr{color:var(--rd)}.lp{color:var(--pp)}
.il{display:block;font-size:12px;color:var(--t3);margin-bottom:6px;font-weight:600}
.h1{font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(--t)}.h2{font-size:20px;font-weight:700;color:var(--t)}.h3{font-size:15px;font-weight:600;color:var(--t)}
.sub{color:var(--t2);font-size:14px;line-height:1.7}.dim{color:var(--t3);font-size:13px;line-height:1.6}
/* Inputs */
.inp,.sel,.ta{width:100%;background:var(--bg);border:1.5px solid var(--b1);border-radius:10px;padding:13px 16px;color:var(--t);font-size:15px;font-family:var(--fb);outline:none;transition:border-color .15s}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(22,163,74,.1)}.ta{resize:vertical;min-height:64px}.sel{appearance:none;cursor:pointer}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 26px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;outline:none;border:none;transition:all .15s;box-shadow:var(--sh)}
.btn:active{transform:scale(.97)}
.bg{background:var(--g);color:#fff}.bg:hover{background:#15803d}
.bb{background:var(--bl);color:#fff}.bb:hover{background:#0369a1}
.ba{background:var(--am);color:#fff}
.br{background:var(--rd);color:#fff}
.bx{background:var(--s2);color:var(--t3);border:1px solid var(--b1)}.bx:hover{background:var(--b1)}
.bf{width:100%;text-align:center;padding:14px}
.chip{padding:12px 18px;font-size:14px;border-radius:10px;cursor:pointer;border:1.5px solid var(--b1);background:var(--bg);color:var(--t3);transition:all .15s;font-weight:500}
.chip:hover{border-color:var(--b2)}.chip.on{background:var(--gl);color:var(--gb);border-color:#86efac;font-weight:700}
.tg{padding:11px 18px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid var(--b1);background:var(--bg);color:var(--t3);outline:none}.tg.on{background:var(--gl);color:var(--gb);border-color:#86efac}
/* Alerts */
.al{padding:16px 20px;border-radius:var(--r);margin-bottom:12px;font-size:14px;line-height:1.5;display:flex;gap:14px;align-items:flex-start;font-weight:600;box-shadow:var(--sh)}
.al-r{background:var(--rdl);color:var(--rdb);border:1.5px solid #fca5a5}.al-a{background:var(--aml);color:var(--amb);border:1.5px solid #fcd34d}.al-g{background:var(--gl);color:var(--gb);border:1.5px solid #86efac}
.wrn{padding:14px 18px;background:var(--rdl);border-radius:10px;color:var(--rdb);font-size:13px;line-height:1.6;font-weight:500}
/* Badges */
.bdg{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 12px;border-radius:8px;font-family:var(--fm);font-weight:700}
.bdg-g{background:var(--gl);color:var(--gb)}.bdg-b{background:var(--bll);color:var(--blb)}.bdg-a{background:var(--aml);color:var(--amb)}.bdg-r{background:var(--rdl);color:var(--rdb)}.bdg-p{background:var(--ppl);color:var(--ppb)}
/* Progress */
.pb{height:10px;background:var(--b1);border-radius:5px;overflow:hidden;margin:8px 0}.pbf{height:100%;border-radius:5px;transition:width .6s ease;background:linear-gradient(90deg,var(--g),#4ade80)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.fb{display:flex;gap:8px;flex-wrap:wrap}
/* ═══ MISSION STEP ═══ */
.ms{display:flex;gap:16px;padding:18px 20px;border-radius:14px;margin-bottom:8px;border:1.5px solid var(--b1);background:var(--bg);transition:all .25s;cursor:pointer;align-items:flex-start;box-shadow:var(--sh)}
.ms:hover{box-shadow:var(--sh2);border-color:var(--b2)}
.ms:active{transform:scale(.985)}
.ms.done{border-color:#86efac;background:var(--gl);animation:msDone .4s ease;box-shadow:0 2px 12px rgba(22,163,74,.08)}
.ms.locked{border-color:var(--b1);background:var(--s2)}
.ms-n{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;font-family:var(--fm);flex-shrink:0;border:2px solid var(--b1);color:var(--t4);background:var(--s1);transition:all .25s}
.ms.done .ms-n{background:var(--g);border-color:var(--g);color:#fff;font-size:18px;animation:msCheck .35s cubic-bezier(.4,0,.2,1);box-shadow:0 3px 12px rgba(22,163,74,.3)}
.ms-body{flex:1;min-width:0}
.ms-t{font-weight:700;font-size:15px;color:var(--t)}.ms.done .ms-t{color:var(--gb);text-decoration:line-through;text-decoration-color:rgba(22,163,74,.35)}
.ms-d{font-size:13px;color:var(--t3);margin-top:4px;line-height:1.5}
.ms-r{font-family:var(--fm);font-size:11px;color:var(--t4);margin-top:6px;display:inline-block;padding:3px 10px;background:var(--s1);border-radius:6px;font-weight:600}
/* Ring */
.ring-w{position:relative;display:inline-block}.ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-v{font-size:32px;font-weight:800;font-family:var(--fm);line-height:1;color:var(--t)}.ring-l{font-size:10px;color:var(--t4);font-family:var(--fm);letter-spacing:2px;margin-top:4px;font-weight:700}
/* Streak */
.str{display:flex;gap:8px;justify-content:center;margin:12px 0}
.str-d{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--fm)}
.str-on{background:var(--gl);border:2px solid #86efac;color:var(--gb)}
.str-off{background:var(--s2);border:2px solid var(--b1);color:var(--t4)}
.str-now{border:2.5px solid var(--g)!important;box-shadow:0 0 10px rgba(22,163,74,.18)}
/* Celebration */
@keyframes msDone{0%{transform:scale(1);box-shadow:var(--sh)}20%{transform:scale(1.02);box-shadow:0 0 20px rgba(34,197,94,.15)}60%{transform:scale(1.005)}100%{transform:scale(1);box-shadow:0 2px 12px rgba(22,163,74,.08)}}
@keyframes msCheck{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes celebrate{0%{transform:scale(.95);opacity:0}50%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
.done-box{text-align:center;padding:36px 24px;background:linear-gradient(135deg,var(--gl),#bbf7d0);border:2px solid #86efac;border-radius:18px;margin-bottom:16px;box-shadow:0 6px 24px rgba(22,163,74,.12);animation:celebrate .5s ease}
.done-box h2{color:var(--gb);font-size:24px;margin-bottom:10px}.done-box p{color:var(--t2);font-size:15px;line-height:1.6}
/* Hero */
.hero{text-align:center;padding:32px 28px;background:linear-gradient(135deg,var(--gl) 0%,var(--bll) 100%);border-radius:18px;margin-bottom:18px;border:2px solid #86efac;box-shadow:0 4px 20px rgba(22,163,74,.1)}
.hero-h{font-size:16px;font-weight:800;color:var(--g);letter-spacing:4px;font-family:var(--fm);margin-bottom:10px}
.hero-p{color:var(--t2);font-size:16px;font-weight:500;line-height:1.7}
/* Sessions */
.ss{padding:14px 0;border-bottom:1px solid var(--b1)}.ss:last-child{border-bottom:none}
.ss-h{display:flex;justify-content:space-between;align-items:center}
.fbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fbar select{background:var(--bg);border:1.5px solid var(--b1);color:var(--t2);padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;outline:none;cursor:pointer}
/* FAB */
.fab{position:fixed;bottom:24px;right:24px;z-index:80;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.fab-m{width:56px;height:56px;border-radius:16px;background:var(--g);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(22,163,74,.3);display:flex;align-items:center;justify-content:center;transition:all .2s}
.fab-m:hover{transform:scale(1.05)}.fab-m.op{background:var(--s2);color:var(--t3);box-shadow:var(--sh2)}
.fab-o{padding:14px 22px;border-radius:12px;background:var(--bg);border:1.5px solid var(--b1);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:var(--sh2);display:none}.fab-o:hover{background:var(--s1)}.fab-o.sh{display:block}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mdl{background:var(--bg);border:1px solid var(--b1);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
/* Role */
.rb{background:var(--bg);border:1.5px solid var(--b1);border-radius:16px;padding:32px;cursor:pointer;text-align:left;color:var(--t);min-width:220px;transition:all .2s;outline:none;box-shadow:var(--sh)}
.rb:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.rb-o{border-color:#86efac}.rb-o:hover{border-color:var(--g);box-shadow:0 4px 20px rgba(22,163,74,.1)}
.rb-j{border-color:#93c5fd}.rb-j:hover{border-color:var(--bl);box-shadow:0 4px 20px rgba(2,132,199,.1)}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}.rb{min-width:160px;padding:24px}.fab-m{width:52px;height:52px}.body{padding:12px 12px 120px}.ms{padding:14px}}
</style>

function td(){return new Date().toISOString().split("T")[0]}
function dA(d,n){try{return(Date.now()-new Date(d).getTime())/864e5<=n}catch(e){return false}}
function dayN(o){const d=new Date();d.setDate(d.getDate()-o);return["S","M","T","W","T","F","S"][d.getDay()]}
function dayDt(o){const d=new Date();d.setDate(d.getDate()-o);return d.toISOString().split("T")[0]}
let tT;function fl(m,t="ok"){const el=document.getElementById("toast");el.innerHTML=m;el.className="toast "+t;clearTimeout(tT);tT=setTimeout(()=>el.className="toast",3000)}
function gEN(p){if(p<=2)return[...(EX[p].s||[]).map(x=>x[0]),...(EX[p].e||[]).map(x=>x[0])];if(p===3)return[...EX[3].wrist.map(x=>x[0]),...EX[3].elbow.map(x=>x[0])];return["Movement Reintroduction"]}
function gEAll(p){if(p<=2)return[...(EX[p].s||[]),...(EX[p].e||[])];if(p===3)return[...EX[3].wrist,...EX[3].elbow];return[]}
function tAcc(id){const b=document.getElementById("ab-"+id),i=document.getElementById("ai-"+id);if(b){b.classList.toggle("open");if(i)i.classList.toggle("open")}}
function goHome(){role=null;tab="Today";fabO=false;editId=null;cfm=null;render()}

/*╔══════════════════════════════╗
  ║   3. INTELLIGENCE ENGINE    ║
  ╚══════════════════════════════╝*/
function getAlerts(){const a=[],ss=D.sessions||[],ph=D.currentPhase||1;const tS=ss.filter(s=>s.date===td());
if(tS.length>=2){a.push({t:"warn",m:tS.length+" device sessions today. Never stack (min 4hr gap)."});const areas={};tS.forEach(s=>{areas[s.area]=(areas[s.area]||0)+1});Object.entries(areas).forEach(([k,v])=>{if(v>1)a.push({t:"warn",m:"Duplicate "+k+" session today."})})}
if(tS.length>=2){const sorted=[...tS].sort((a,b)=>(a.id||0)-(b.id||0));for(let i=1;i<sorted.length;i++){const hrs=((sorted[i].id||0)-(sorted[i-1].id||0))/36e5;if(hrs<4&&hrs>0)a.push({t:"warn",m:"< 4hr gap between "+sorted[i-1].area+" and "+sorted[i].area+"."})}}
const all=[...ss,...(D.exerciseLogs||[])].sort((x,y)=>(y.date||"").localeCompare(x.date||""));
if(all.length>0){const ds=Math.floor((Date.now()-new Date(all[0].date).getTime())/864e5);if(ds>=3)a.push({t:"warn",m:"No activity in "+ds+" days. Recovery needs consistency."});else if(ds===2)a.push({t:"info",m:"You skipped yesterday. Get a session in today."})}
const wkD=ss.filter(s=>dA(s.date,7));
if(ph===1&&ss.length>2){const ft=wkD.filter(s=>s.area==="Right Foot");if(ft.length<3)a.push({t:"info",m:"Right foot: "+ft.length+"/3 this week."})}
if(ss.length>2){const eb=wkD.filter(s=>s.area==="Right Elbow");if(eb.length<2)a.push({t:"info",m:"Elbow: "+eb.length+"/2 this week."})}
return a}
function canLog(){const tS=(D.sessions||[]).filter(s=>s.date===td());if(tS.length>=3)return{ok:false,msg:"3 sessions today. Maximum reached."};if(tS.length>0){const last=tS[tS.length-1];const hrs=(Date.now()-(last.id||0))/36e5;if(hrs<4)return{ok:true,warn:"Only "+Math.round(hrs*10)/10+"hr since last session ("+last.area+"). Min 4hr."}}return{ok:true}}
function devStatus(){const tS=(D.sessions||[]).filter(s=>s.date===td());if(tS.length===0)return{locked:false,msg:"Ready"};const last=tS[tS.length-1];const ms=Date.now()-(last.id||0);const hrs=ms/36e5;if(hrs>=4)return{locked:false,msg:"Ready"};const remain=4*36e5-ms;const rh=Math.floor(remain/36e5);const rm=Math.floor((remain%36e5)/6e4);if(tS.length>=3)return{locked:true,msg:"Daily max reached"};return{locked:false,cooldown:true,msg:"Next in "+rh+"h "+rm+"m (after "+last.area+")"}}

/*╔══════════════════════════════╗
  ║     4. FEEDBACK ENGINE      ║
  ╚══════════════════════════════╝*/
function getWk(){const ss=D.sessions||[],el=D.exerciseLogs||[];const wD=ss.filter(s=>dA(s.date,7)),wE=el.filter(s=>dA(s.date,7));
const en=gEN(D.currentPhase||1),cs=new Set();wE.forEach(e=>(e.completed||[]).forEach(c=>cs.add(c)));
const allDates=new Set([...ss.map(s=>s.date),...el.map(s=>s.date),...(D.completedDays||[])]);let streak=0;for(let i=0;i<60;i++){if(allDates.has(dayDt(i)))streak++;else break}
const logDays=new Set([...wD.map(s=>s.date),...wE.map(s=>s.date)]);
return{dc:wD.length,ec:wE.length,adh:en.length?Math.round(cs.size/en.length*100):0,streak,days:logDays.size,missed:7-logDays.size}}
function getFb(){const w=getWk(),m=[];const tot=w.dc+w.ec;
if(tot>=7)m.push({t:"ok",m:"&#128170; "+tot+" sessions this week. You're showing up consistently."});
else if(tot>=4)m.push({t:"ok",m:"&#128077; "+tot+" sessions this week. Nice work \u2014 keep it up."});
else if(tot>0&&tot<3)m.push({t:"info",m:"&#128200; "+tot+" session"+(tot>1?"s":"")+" so far. You've started \u2014 now build on it."});
if(w.adh>=80)m.push({t:"ok",m:"&#127942; "+w.adh+"% exercise coverage. You're hitting your movements."});
else if(w.adh>=40&&w.adh<80)m.push({t:"info",m:"&#128221; "+w.adh+"% exercise coverage. Getting there \u2014 a few more and you're solid."});
else if(w.adh>0&&w.adh<40)m.push({t:"info",m:"&#128221; "+w.adh+"% coverage. Focus on completing more movements today."});
if(w.streak>=7)m.push({t:"ok",m:"&#128293; "+w.streak+"-day streak! Incredible discipline."});
else if(w.streak>=3)m.push({t:"ok",m:"&#128293; "+w.streak+"-day streak. You're building real momentum."});
if(w.missed>=5)m.push({t:"info",m:"&#128197; "+w.missed+" missed days. Every session matters \u2014 get one in today."});
else if(w.missed>=3)m.push({t:"info",m:"&#128197; "+w.missed+" missed days. You can turn this week around."});
return m}

/*╔══════════════════════════════╗
  ║    5. COMPONENTS            ║
  ╚══════════════════════════════╝*/
function C(h,c=""){return`<div class="cd ${c}">${h}</div>`}
function L(t,c=""){return`<div class="lbl ${c}">${t}</div>`}
function A(id,title,body,lc="",open=false){return`<div class="cd"><div class="ac-h" onclick="tAcc('${id}')"><div>${lc?`<span class="lbl ${lc}" style="margin-bottom:0">${title}</span>`:`<span class="h3">${title}</span>`}</div><span class="ac-i${open?" open":""}" id="ai-${id}">&#9660;</span></div><div class="ac-b${open?" open":""}" id="ab-${id}"><div style="padding-top:10px">${body}</div></div></div>`}
function Al(t,m){const ic=t==="warn"?"&#9888;&#65039;":t==="info"?"&#128161;":"&#9989;";return`<div class="al al-${t==="warn"?"r":t==="info"?"a":"g"}"><span style="font-size:18px;flex-shrink:0">${ic}</span><span>${m}</span></div>`}
function Pb(p){return`<div class="pb"><div class="pbf" style="width:${Math.min(100,Math.max(0,p))}%"></div></div>`}
function Ring(pct,label,sz=120,sw=11){const r=(sz-sw)/2,c=2*Math.PI*r,off=c-(pct/100)*c;const col=pct>=80?"var(--g)":pct>=50?"var(--am)":"var(--rd)";return`<div class="ring-w" style="width:${sz}px;height:${sz}px"><svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--b1)" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/></svg><div class="ring-txt"><div class="ring-v">${pct}</div><div class="ring-l">${label}</div></div></div>`}
function Streak(){const ss=D.sessions||[],el=D.exerciseLogs||[];const allD=new Set([...ss.map(s=>s.date),...el.map(s=>s.date),...(D.completedDays||[])]);let h=`<div class="str">`;for(let i=6;i>=0;i--){const d=dayDt(i),on=allD.has(d);h+=`<div class="str-d ${on?"str-on":"str-off"}${i===0?" str-now":""}">${dayN(i)}</div>`}return h+`</div>`}
function ExCard(n,d,r){return C(`<div style="display:flex;justify-content:space-between;align-items:center"><div class="h3">${esc(n)}</div><span class="bdg bdg-b">${esc(r)}</span></div><div class="sub" style="margin-top:6px">${esc(d)}</div>`)}

/*╔══════════════════════════════╗
  ║       6. MAIN RENDER        ║

function render(){const app=document.getElementById("app");if(!role){app.innerHTML=rRole();return}
const isO=role==="owner",ph=D.currentPhase||1,pi=PH[ph-1];
const vtabs=["Today","Phases","Train","Injuries","Device","Log","Rules"];if(isO)vtabs.push("Settings");
let h=`<div class="hdr"><div class="wrap hdr-in"><div style="display:flex;align-items:center;gap:10px"><button onclick="goHome()" style="background:var(--s1);border:1.5px solid var(--b1);padding:7px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--t2);font-size:12px;font-weight:700;outline:none;font-family:var(--fm)">&#9664; HOME</button><span class="bdg bdg-g">PHASE ${ph}</span></div><span class="bdg ${isO?"bdg-g":"bdg-b"}">${isO?"QUENNE":"JARRETT"}</span></div></div>`;
h+=`<div class="nav-w"><div class="wrap"><div class="nav">${vtabs.map(t=>`<button class="nb${tab===t?" on":""}" onclick="tab='${t}';render()">${t}</button>`).join("")}</div></div></div>`;
h+=`<div class="body"><div class="wrap">`;
if(tab==="Today")h+=rToday(ph,pi);else if(tab==="Phases")h+=rPhases(ph,isO);else if(tab==="Train")h+=rTrain(ph,pi);else if(tab==="Injuries")h+=rInj();else if(tab==="Device")h+=rDev(ph);else if(tab==="Log")h+=rLog(ph);else if(tab==="Rules")h+=rRules();else if(tab==="Settings")h+=rSet();
h+=`</div></div>`;
h+=`<div class="fab"><button class="fab-o${fabO?" sh":""}" onclick="fabO=false;tab='Log';logT='exercise';render()">&#9650; Exercise</button><button class="fab-o${fabO?" sh":""}" onclick="fabO=false;tab='Log';logT='device';render()">&#9889; Device</button><button class="fab-m${fabO?" op":""}" onclick="fabO=!fabO;render()">${fabO?"&#10005;":"+"}</button></div>`;
if(editId!==null)h+=rModal();app.innerHTML=h}

function rRole(){return`<div class="mid"><div style="text-align:center"><div style="font-size:11px;font-family:var(--fm);letter-spacing:6px;color:var(--t3);margin-bottom:20px;font-weight:700">RECOVERY SYSTEM</div><h1 style="font-size:52px;font-weight:800;letter-spacing:-3px;margin:0 0 12px;color:var(--t)">JARRETT</h1><p style="color:var(--t3);font-size:15px;max-width:380px;margin:0 auto 48px;line-height:1.7">Your guided recovery assistant. PT. Training. EM therapy. One system.</p><div class="fb" style="justify-content:center;gap:16px"><button class="rb rb-o" onclick="sR('owner');tab='Today';render()"><div style="font-size:10px;font-family:var(--fm);letter-spacing:3px;color:var(--g);margin-bottom:12px;font-weight:700">OWNER</div><div style="font-size:20px;font-weight:800">Quenne</div><div style="font-size:13px;color:var(--t3);margin-top:10px">Phase control, settings, rules</div></button><button class="rb rb-j" onclick="sR('jarrett');tab='Today';render()"><div style="font-size:10px;font-family:var(--fm);letter-spacing:3px;color:var(--bl);margin-bottom:12px;font-weight:700">ATHLETE</div><div style="font-size:20px;font-weight:800">Jarrett</div><div style="font-size:13px;color:var(--t3);margin-top:10px">Protocol, logging, progress</div></button></div></div></div>`}

/*╔══════════════════════════════╗
  ║  7. TODAY = CORE EXPERIENCE ║
  ╚══════════════════════════════╝*/
function rToday(ph,pi){const wk=getWk(),alerts=getAlerts(),fb=getFb();
const exAll=gEAll(ph),dvDue=DV.filter(d=>d.ph===0||d.ph<=ph);
const total=exAll.length+dvDue.length,completed=done.ex.length+done.dv.length;
const pct=total?Math.round(completed/total*100):0;const allDone=total>0&&completed===total;
let h="";
if(alerts.length)h+=alerts.map(a=>Al(a.t,a.m)).join("");
const ss=D.sessions||[],el=D.exerciseLogs||[];
if(ss.length===0&&el.length===0)h+=`<div class="hero"><div class="hero-h">&#128073; START HERE</div><div class="hero-p">Complete each step below in order.<br>Tap a step to mark it done. Don't skip ahead.</div></div>`;
// Progress
h+=`<div class="cd" style="text-align:center;padding:28px 24px"><div style="display:flex;justify-content:center;align-items:center;gap:32px;flex-wrap:wrap;margin-bottom:16px">${Ring(pct,"TODAY")}<div style="text-align:left"><div class="h1" style="color:${allDone?"var(--g)":"var(--t)"};font-size:28px">${allDone?"ALL DONE":completed+"/"+total}</div><div class="dim" style="font-size:14px">${allDone?"Come back tomorrow":"tasks remaining"}</div><div style="margin-top:14px;display:flex;gap:20px"><div><div style="font-size:22px;font-weight:800;font-family:var(--fm)">${wk.streak}</div><div style="font-size:10px;color:var(--t4);font-family:var(--fm);letter-spacing:1.5px;font-weight:700">&#128293; STREAK</div></div><div><div style="font-size:22px;font-weight:800;font-family:var(--fm)">${wk.adh}%</div><div style="font-size:10px;color:var(--t4);font-family:var(--fm);letter-spacing:1.5px;font-weight:700">WEEKLY</div></div><div><div style="font-size:22px;font-weight:800;font-family:var(--fm)">${wk.days}/7</div><div style="font-size:10px;color:var(--t4);font-family:var(--fm);letter-spacing:1.5px;font-weight:700">ACTIVE</div></div></div></div></div>${Streak()}</div>`;
if(fb.length)h+=fb.map(f=>Al(f.t,f.m)).join("");
if(allDone)h+=`<div class="done-box"><h2>&#127881; Great job! You completed today's plan.</h2><p>Recovery is built one day at a time. You showed up today.</p><div style="margin-top:16px;display:flex;justify-content:center;gap:24px"><div><div style="font-size:32px;font-weight:800;color:var(--g);font-family:var(--fm)">&#128293; ${wk.streak}</div><div style="font-size:11px;color:var(--t3);font-family:var(--fm);letter-spacing:2px;margin-top:2px">DAY STREAK</div></div><div><div style="font-size:32px;font-weight:800;color:var(--g);font-family:var(--fm)">${wk.adh}%</div><div style="font-size:11px;color:var(--t3);font-family:var(--fm);letter-spacing:2px;margin-top:2px">THIS WEEK</div></div></div></div>`;
// ═══ MISSION BOARD ═══
h+=`<div style="background:var(--bg);border:2px solid var(--b1);border-radius:18px;padding:24px;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.06)">`;
h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="lbl lp" style="font-size:12px;letter-spacing:3px;margin-bottom:0">&#128073; YOUR MISSION TODAY</div><span class="bdg ${pct===100?"bdg-g":"bdg-a"}" style="font-size:13px;padding:5px 14px">${completed}/${total} &mdash; ${pct}%</span></div>`;
h+=Pb(pct);
let step=1;
if(exAll.length){h+=`<div style="margin-bottom:6px;margin-top:14px">${L("STEP "+step+": DO YOUR EXERCISES","lb")}</div>`;
exAll.forEach((e,i)=>{const d=done.ex.includes(e[0]);h+=`<div class="ms${d?" done":""}" onclick="tckEx('${esc(e[0])}')"><div class="ms-n">${d?"&#10003;":step+"."+(i+1)}</div><div class="ms-body"><div class="ms-t">${esc(e[0])}</div><div class="ms-d">${esc(e[1])}</div><div class="ms-r">${esc(e[2])}</div></div></div>`});step++}
h+=`<div style="margin-bottom:6px;margin-top:20px">${L("STEP "+step+": DEVICE SESSIONS","lg")}</div>`;
const dvSt=devStatus();
dvDue.forEach((d,i)=>{const dn=done.dv.includes(d.a);const isLocked=dvSt.locked&&!dn;
h+=`<div class="ms${dn?" done":""}${isLocked?" locked":""}" onclick="${isLocked?"fl('"+esc(dvSt.msg)+"','warn')":"tckDv('"+esc(d.a)+"')"}" style="${isLocked?"opacity:.5;cursor:not-allowed":""}"><div class="ms-n">${dn?"&#10003;":isLocked?"&#128274;":step+"."+(i+1)}</div><div class="ms-body"><div class="ms-t">${esc(d.a)}${isLocked?` <span style="font-size:11px;color:var(--rdb);font-weight:500"> &mdash; ${esc(dvSt.msg)}</span>`:dvSt.cooldown&&!dn?` <span style="font-size:11px;color:var(--amb);font-weight:500"> &mdash; ${esc(dvSt.msg)}</span>`:""}</div><div class="ms-d">${esc(d.md)} &middot; ${esc(d.it)} &middot; ${esc(d.du)}</div><div class="ms-r">${esc(d.fr)}</div></div></div>`});step++;
h+=`<div style="margin-bottom:6px;margin-top:20px">${L("STEP "+step+": KNOW YOUR LIMITS","lr")}</div>`;
h+=`<div class="cd cd-r" style="padding:14px 18px">${(PR[ph]||[]).map(r=>`<div style="padding:4px 0;font-size:13px;color:var(--rdb);display:flex;gap:8px"><span>&#10005;</span><span style="flex:1">${esc(r[0])}${r[1]?` <span style="color:var(--g);font-size:12px">&#8594; ${esc(r[1])}</span>`:""}</span></div>`).join("")}</div>`;
h+=`</div>`;/* close mission board container */
h+=A("ctx","Phase "+ph+" Details",`<div class="sub">${esc(pi.g)}</div><div style="margin-top:8px;padding:12px 16px;background:var(--s1);border-radius:10px"><div class="dim" style="font-family:var(--fm);font-size:9px;letter-spacing:2px;font-weight:700">GATE</div><div class="sub" style="margin-top:4px">${esc(pi.gt)}</div></div><div class="wrn" style="margin-top:8px">${esc(pi.wr)}</div>`,"la",false);
h+=`<div style="margin-top:18px"><div class="fb"><button class="btn bg" style="flex:1" onclick="tab='Log';logT='device';render()">&#9889; Log Device</button><button class="btn bb" style="flex:1" onclick="tab='Log';logT='exercise';render()">&#9650; Log Exercise</button></div></div>`;
h+=`<div style="margin-top:18px">`;
h+=A("rf","&#9888; Red Flags",RF.map(r=>`<div style="padding:5px 0;font-size:13px;color:var(--rdb);border-bottom:1px solid var(--b1)"><span style="font-family:var(--fm);font-size:9px;color:var(--t4);margin-right:6px">${esc(r[0].toUpperCase())}</span>${esc(r[1])}</div>`).join(""),"lr",false);
h+=A("gl","&#128274; Global Restrictions",GR.map(r=>`<div style="padding:4px 0;font-size:13px"><span style="color:var(--rdb)">&#10005; ${esc(r.m)}</span><span class="dim" style="margin-left:8px">${esc(r.r)}</span></div>`).join(""),"",false);
h+=`</div>`;/* close spacing wrapper */
return h}
function tckEx(n){if(done.ex.includes(n))done.ex=done.ex.filter(x=>x!==n);else{done.ex.push(n);fl("&#10003; "+n+" completed","ok")}svDone();checkAllDone();render()}
function tckDv(n){const chk=canLog();if(!chk.ok){fl(chk.msg,"warn");return}if(done.dv.includes(n))done.dv=done.dv.filter(x=>x!==n);else{done.dv.push(n);if(chk.warn)fl(chk.warn,"info");else fl("&#9889; "+n+" session done","ok")}svDone();checkAllDone();render()}
function checkAllDone(){const ph=D.currentPhase||1;const exAll=gEAll(ph),dvDue=DV.filter(d=>d.ph===0||d.ph<=ph);const total=exAll.length+dvDue.length;const completed=done.ex.length+done.dv.length;if(total>0&&completed>=total){if(!D.completedDays)D.completedDays=[];if(!D.completedDays.includes(td())){D.completedDays.push(td());sv();setTimeout(()=>fl("&#127881; Mission complete! Streak updated.","ok"),400)}}}

/*── PHASES ──*/
function rPhases(ph,isO){let h=L("PHASES")+Pb(ph/4*100)+`<div class="dim" style="margin-bottom:14px">Phase ${ph}/4</div>`;
PH.forEach(p=>{const cur=p.id===ph,clr=p.id<ph,lck=p.id>ph;
let body=`<div class="sub" style="margin-top:8px">${esc(p.g)}</div><div class="dim" style="margin-top:6px">&#127937; ${esc(p.gt)}</div>`;
if(cur){body+=`<div style="margin-top:10px">${L("RESTRICTIONS","lr")}${(PR[p.id]||[]).map(r=>`<div style="padding:4px 0;font-size:13px"><span style="color:var(--rdb)">&#10005; ${esc(r[0])}</span>${r[1]?`<span style="color:var(--g);margin-left:8px;font-size:12px">&#8594; ${esc(r[1])}</span>`:""}</div>`).join("")}</div><div class="wrn" style="margin-top:8px">${esc(p.wr)}</div>`;
if(isO&&p.id<4){if(cfm!=="adv")body+=`<button class="btn bg" style="margin-top:14px" onclick="cfm='adv';render()">Advance &#8594;</button>`;
else body+=`<div style="margin-top:14px;padding:16px;background:var(--s1);border-radius:12px"><div class="h3">Advance Phase</div><label class="il" style="margin-top:10px">Cleared movements:</label><textarea class="ta" id="adv-c"></textarea><label class="il" style="margin-top:10px;display:flex;gap:8px;cursor:pointer"><input type="checkbox" id="adv-ok"><span>Confirmed improvement</span></label><div class="fb" style="margin-top:12px"><button class="btn bg" onclick="doAdv(${p.id})">Confirm</button><button class="btn bx" onclick="cfm=null;render()">Cancel</button></div></div>`}}
h+=`<div class="cd ${cur?"cd-g":clr?"cd-b":""}" style="opacity:${lck?.45:1}"><div style="display:flex;justify-content:space-between;align-items:center"><div><span class="bdg ${clr?"bdg-g":cur?"bdg-a":"bdg-b"}">${clr?"&#10003; CLEARED":cur?"&#9679; ACTIVE":"&#128274; LOCKED"}</span><div class="h3" style="margin-top:6px">P${p.id} &mdash; ${esc(p.a)}</div></div><span class="dim" style="font-family:var(--fm)">Wk ${p.w}</span></div><div class="ac-h" onclick="tAcc('ph${p.id}')"><span></span><span class="ac-i${cur?" open":""}" id="ai-ph${p.id}">&#9660;</span></div><div class="ac-b${cur?" open":""}" id="ab-ph${p.id}">${body}</div></div>`});return h}
function doAdv(pid){const ok=document.getElementById("adv-ok");if(!ok||!ok.checked){fl("Confirm improvement","warn");return}const c=(document.getElementById("adv-c")||{}).value||"";D.phaseHistory=(D.phaseHistory||[]);D.phaseHistory.push({phase:pid,clearedAt:new Date().toISOString(),movements:c});D.currentPhase=pid+1;D.version=(parseFloat(D.version)+.1).toFixed(1);D.clearedMovements=[...(D.clearedMovements||[]),c];sv();cfm=null;done={ex:[],dv:[]};fl("Phase "+(pid+1)+" active");render()}

/*── TRAIN ──*/
function rTrain(ph,pi){let h=L("PHASE "+ph)+`<div class="h2">${esc(pi.a)}</div><div class="sub" style="margin-bottom:16px">${esc(pi.g)}</div>`;
if(ph<=2){h+=A("str","&#129495; Stretches - Daily",(EX[ph].s||[]).map(s=>ExCard(s[0],s[1],s[2])).join(""),"lg",true);h+=A("exr","&#128170; Exercises",(EX[ph].e||[]).map(e=>ExCard(e[0],e[1],e[2])).join(""),"lb",true)}
if(ph===3){h+=`<div class="wrn" style="margin-bottom:12px">&#9888; Brace during ALL upper body.</div>`;h+=A("wr","Left Wrist",EX[3].wrist.map(s=>ExCard(s[0],s[1],s[2])).join(""),"lb",true);h+=A("elb","Right Elbow",EX[3].elbow.map(e=>ExCard(e[0],e[1],e[2])).join(""),"la",true);h+=A("mod","Upper Body Mods",EX[3].mods.map(m=>C(`<div style="font-size:12px;color:var(--amb);font-weight:600">REPLACE: ${esc(m[0])}</div><div class="sub" style="margin-top:4px">&#8594; ${esc(m[1])}</div>`)).join(""),"la",false)}
if(ph===4)h+=A("re","Reintegration",EX[4].steps.map(s=>C(`<div class="sub">${esc(s)}</div>`)).join(""),"lg",true);return h}

/*── INJURIES ──*/
function rInj(){let h=L("INJURIES")+`<div class="sub" style="margin-bottom:14px">Left-side = downstream from right foot guarding.</div>`;
INJ.forEach((inj,i)=>{h+=A("inj"+i,inj.a+" - "+inj.t,`${inj.d.map(d=>`<div class="sub">&#8226; ${esc(d)}</div>`).join("")}<div class="wrn" style="margin-top:8px">${inj.w.map(w=>`<div>${esc(w)}</div>`).join("")}</div>`,"la",false)});return h}

/*── DEVICE ──*/
function rDev(ph){let h=L("EM THERAPY")+`<div class="dim" style="margin-bottom:14px">Min 4hr between. Never stack. Log everything.</div>`;
DV.forEach((d,i)=>{const act=d.ph===0||d.ph<=ph;
let body=`<div class="g2" style="font-size:13px;margin-top:6px"><div>Mode: ${esc(d.md)}</div><div>Int: ${esc(d.it)}</div><div>Dur: ${esc(d.du)}</div><div>Pos: ${esc(d.ps)}</div></div><div style="margin-top:6px;font-size:12px;color:var(--t3)">Pads: &#9312; ${esc(d.p1)} &#9313; ${esc(d.p2)}</div>${act?`<div style="margin-top:8px;padding:10px 14px;background:var(--s1);border-radius:10px">${d.fb.map(f=>`<div style="font-size:12px;color:${f.includes("STOP")?"var(--rdb)":"var(--t2)"};padding:2px 0">${f.includes("STOP")?"&#9888; ":"&#8594; "}${esc(f)}</div>`).join("")}</div>`:""}`
h+=`<div class="cd ${act?"cd-g":""}" style="opacity:${act?1:.35}"><div style="display:flex;justify-content:space-between"><div class="h3">${esc(d.a)}</div><span class="bdg bdg-g">${esc(d.fr)}</span></div><div class="ac-h" onclick="tAcc('dv${i}')"><span></span><span class="ac-i" id="ai-dv${i}">&#9660;</span></div><div class="ac-b" id="ab-dv${i}">${body}</div></div>`});return h}

/*── LOG ──*/
function rLog(ph){let h=`<div class="fb" style="margin-bottom:14px"><button class="tg${logT==="device"?" on":""}" style="flex:1;text-align:center" onclick="logT='device';render()">&#9889; Device</button><button class="tg${logT==="exercise"?" on":""}" style="flex:1;text-align:center" onclick="logT='exercise';render()">&#9650; Exercise</button></div>`;
if(logT==="device"){const chk=canLog();if(chk.warn)h+=Al("info",chk.warn);if(!chk.ok)h+=Al("warn",chk.msg);
h+=C(`${L("LOG DEVICE")}<div class="g2" style="margin-top:10px"><div><label class="il">Date</label><input class="inp" type="date" id="ld" value="${td()}"></div><div><label class="il">Area</label><select class="sel" id="la">${["Right Foot","Lumbar/Pelvis","Left Wrist","Right Elbow"].map(a=>`<option>${a}</option>`).join("")}</select></div><div><label class="il">Mode</label><input class="inp" id="lm" placeholder="Mode 4 Cupping"></div><div><label class="il">Intensity</label><input class="inp" id="li" placeholder="12/20"></div></div><div style="margin-top:10px"><label class="il">Duration</label><input class="inp" id="ldu" placeholder="15 min"></div><div style="margin-top:10px"><label class="il">Feedback</label><textarea class="ta" id="lf" placeholder="What did you feel?"></textarea></div><div style="margin-top:10px"><label class="il">Next Day</label><textarea class="ta" id="ln" rows="2" placeholder="Next day follow-up"></textarea></div><button class="btn bg bf" style="margin-top:14px" onclick="subD()">Save Session</button>`)}
else{const names=gEN(ph);h+=C(`${L("LOG EXERCISE - P"+ph)}<div style="margin-top:10px"><label class="il">Date</label><input class="inp" type="date" id="exd" value="${td()}" style="max-width:200px"></div><div style="margin-top:12px"><label class="il">Tap completed</label><div class="fb" style="margin-top:6px">${names.map(n=>`<button class="chip${exC.includes(n)?" on":""}" onclick="tEx('${esc(n)}')">${exC.includes(n)?"&#10003; ":""}${esc(n)}</button>`).join("")}</div></div><div style="margin-top:12px"><label class="il">Notes</label><textarea class="ta" id="exn" placeholder="How did it feel?"></textarea></div><button class="btn bb bf" style="margin-top:14px" onclick="subE(${ph})">Save Log</button>`)}
h+=`<div style="margin-top:16px">${L("HISTORY")}<div class="fbar"><select onchange="flt.type=this.value;render()"><option value="all"${flt.type==="all"?" selected":""}>All</option><option value="d"${flt.type==="d"?" selected":""}>Device</option><option value="e"${flt.type==="e"?" selected":""}>Exercise</option></select><select onchange="flt.area=this.value;render()"><option value="all"${flt.area==="all"?" selected":""}>All Areas</option>${["Right Foot","Lumbar/Pelvis","Left Wrist","Right Elbow"].map(a=>`<option${flt.area===a?" selected":""}>${a}</option>`).join("")}</select><select onchange="flt.days=+this.value;render()"><option value="7"${flt.days===7?" selected":""}>7d</option><option value="30"${flt.days===30?" selected":""}>30d</option><option value="9999"${flt.days===9999?" selected":""}>All</option></select></div></div>`;
const all=[...(D.sessions||[]).map(s=>({...s,_t:"d"})),...(D.exerciseLogs||[]).map(s=>({...s,_t:"e"}))].filter(s=>{if(!dA(s.date,flt.days))return false;if(flt.type!=="all"&&s._t!==flt.type)return false;if(flt.area!=="all"&&s._t==="d"&&s.area!==flt.area)return false;return true}).sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,30);
if(!all.length)h+=C(`<div class="dim" style="text-align:center;padding:14px">No sessions match.</div>`);
else h+=C(all.map(s=>`<div class="ss"><div class="ss-h"><span>${s._t==="e"?`<span class="bdg bdg-b" style="margin-right:4px">EX</span>P${s.phase} - ${(s.completed||[]).length} done`:`<span class="bdg bdg-g" style="margin-right:4px">DEV</span>${esc(s.area)} ${esc(s.mode||"")}`}</span><span class="dim">${fD(s.date)}</span></div>${s.feedback?`<div class="dim" style="margin-top:4px">${esc(s.feedback)}</div>`:""}${s.notes?`<div class="dim" style="margin-top:4px">${esc(s.notes)}</div>`:""}${s.nextDay?`<div style="color:var(--t4);font-size:12px;margin-top:2px">${esc(s.nextDay)}</div>`:""}<div class="fb" style="margin-top:8px"><button class="btn bx" style="padding:6px 14px;font-size:11px" onclick="editId=${s.id};render()">&#9998; Edit</button><button class="btn bx" style="padding:6px 14px;font-size:11px" onclick="delL('${s._t}',${s.id})">Delete</button></div></div>`).join(""));
return h}
function subD(){const m=document.getElementById("lm");if(!m||!m.value){fl("Mode required","warn");return}const chk=canLog();if(!chk.ok){fl(chk.msg,"warn");return}
D.sessions=(D.sessions||[]);D.sessions.push({date:document.getElementById("ld")?.value||td(),area:document.getElementById("la")?.value||"",mode:m.value,intensity:document.getElementById("li")?.value||"",duration:document.getElementById("ldu")?.value||"",feedback:document.getElementById("lf")?.value||"",nextDay:document.getElementById("ln")?.value||"",id:Date.now()});sv();if(chk.warn)fl("&#10003; Saved. "+chk.warn,"info");else fl("&#10003; Device session saved","ok");render()}
function subE(ph){D.exerciseLogs=(D.exerciseLogs||[]);D.exerciseLogs.push({date:document.getElementById("exd")?.value||td(),completed:[...exC],notes:document.getElementById("exn")?.value||"",phase:ph,id:Date.now()});exC=[];sv();fl("&#10003; Exercise log saved","ok");render()}
function tEx(n){if(exC.includes(n))exC=exC.filter(x=>x!==n);else exC.push(n);render()}
function delL(t,id){if(t==="d")D.sessions=(D.sessions||[]).filter(s=>s.id!==id);else D.exerciseLogs=(D.exerciseLogs||[]).filter(s=>s.id!==id);sv();fl("Deleted");render()}
function rModal(){let item=(D.sessions||[]).find(s=>s.id===editId),type="d";if(!item){item=(D.exerciseLogs||[]).find(s=>s.id===editId);type="e"}if(!item){editId=null;return""}
let h=`<div class="mbg" onclick="if(event.target===this){editId=null;render()}"><div class="mdl"><div class="h2" style="margin-bottom:16px">Edit Entry</div>`;
if(type==="d")h+=`<div class="g2"><div><label class="il">Date</label><input class="inp" id="ed-dt" value="${item.date||""}"></div><div><label class="il">Area</label><input class="inp" id="ed-ar" value="${esc(item.area||"")}"></div><div><label class="il">Mode</label><input class="inp" id="ed-md" value="${esc(item.mode||"")}"></div><div><label class="il">Intensity</label><input class="inp" id="ed-it" value="${esc(item.intensity||"")}"></div></div><div style="margin-top:10px"><label class="il">Feedback</label><textarea class="ta" id="ed-fb">${esc(item.feedback||"")}</textarea></div><div style="margin-top:10px"><label class="il">Next Day</label><textarea class="ta" id="ed-nd">${esc(item.nextDay||"")}</textarea></div>`;
else h+=`<div><label class="il">Date</label><input class="inp" id="ed-dt" value="${item.date||""}"></div><div style="margin-top:10px"><label class="il">Notes</label><textarea class="ta" id="ed-nt">${esc(item.notes||"")}</textarea></div>`;
h+=`<div class="fb" style="margin-top:16px"><button class="btn bg" onclick="svEdit('${type}',${editId})">Save</button><button class="btn bx" onclick="editId=null;render()">Cancel</button></div></div></div>`;return h}
function svEdit(t,id){if(t==="d"){const i=(D.sessions||[]).find(s=>s.id===id);if(i){i.date=document.getElementById("ed-dt")?.value||i.date;i.area=document.getElementById("ed-ar")?.value||i.area;i.mode=document.getElementById("ed-md")?.value||i.mode;i.intensity=document.getElementById("ed-it")?.value||i.intensity;i.feedback=document.getElementById("ed-fb")?.value||"";i.nextDay=document.getElementById("ed-nd")?.value||""}}
else{const i=(D.exerciseLogs||[]).find(s=>s.id===id);if(i){i.date=document.getElementById("ed-dt")?.value||i.date;i.notes=document.getElementById("ed-nt")?.value||""}}sv();editId=null;fl("Saved");render()}

/*── RULES ──*/
function rRules(){let h=L("RULES")+`<div class="sub" style="margin-bottom:14px">From all 3 SOPs.</div>`;RL.forEach((r,i)=>{h+=A("rl"+i,r[0],`<div class="sub">${esc(r[1])}</div>`,"",false)});return h}

/*── SETTINGS ──*/
function rSet(){let h=L("SETTINGS")+`<div class="sub" style="margin-bottom:14px">Update when anything changes.</div>`;
h+=C(`${L("NUTRITION","lg")}<div class="g2" style="margin-top:8px"><div><label class="il">Cal</label><input class="inp" value="${esc(D.calorieTarget||"")}" onchange="D.calorieTarget=this.value;sv()" placeholder="2400"></div><div><label class="il">Protein</label><input class="inp" value="${esc(D.proteinTarget||"")}" onchange="D.proteinTarget=this.value;sv()" placeholder="180g"></div><div><label class="il">Carb/Fat</label><input class="inp" value="${esc(D.carbFatApproach||"")}" onchange="D.carbFatApproach=this.value;sv()" placeholder="balanced"></div><div><label class="il">Supps</label><input class="inp" value="${esc(D.supplements||"")}" onchange="D.supplements=this.value;sv()" placeholder="creatine"></div></div>`);
h+=C(`${L("SLEEP","lb")}<label class="il" style="margin-top:8px">Target</label><input class="inp" value="${esc(D.sleepTarget||"")}" onchange="D.sleepTarget=this.value;sv()" placeholder="7-8" style="max-width:140px">`);
h+=C(`${L("INJURIES","la")}<textarea class="ta" style="margin-top:8px" onchange="D.newInjuries=this.value;sv()" placeholder="New injuries...">${esc(D.newInjuries||"")}</textarea>`);
h+=C(`${L("BACKUP")}<div class="fb" style="margin-top:8px"><button class="btn bg" onclick="expD()">&#8595; Export</button><label class="btn bb" style="cursor:pointer">&#8593; Import<input type="file" accept=".json" style="display:none" onchange="impD(this)"></label></div>`);
h+=`<div class="cd cd-r">${L("DANGER","lr")}${cfm!=="reset"?`<button class="btn br" style="margin-top:8px" onclick="cfm='reset';render()">Reset All</button>`:`<div style="margin-top:8px;padding:14px;background:var(--s1);border-radius:10px"><div class="sub" style="color:var(--rdb);margin-bottom:10px">Erase everything?</div><div class="fb"><button class="btn br" onclick="D=mkD();sv();cfm=null;fl('Reset');render()">Yes</button><button class="btn bx" onclick="cfm=null;render()">No</button></div></div>`}</div>`;return h}
function expD(){const b=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="jarrett_"+td()+".json";a.click()}
function impD(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{D=JSON.parse(e.target.result);sv();fl("Imported");render()}catch(err){fl("Invalid","warn")}};r.readAsText(f)}

ld();render();
</script>
</body>
</html>
